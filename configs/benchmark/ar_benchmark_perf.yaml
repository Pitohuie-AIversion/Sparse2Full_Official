experiment:
  name: "AR-DR2D-BenchmarkPerf-SwinUNet-s2025"
  description: "3-epoch performance-focused benchmark; minimal logging"
  device: cuda
  seed: 2025
  output_dir: runs
  log_every_n_steps: 0

data:
  data_path: "data/2D/diffusion-reaction/2D_diff-react_NA_NA.h5"
  dataset_name: RealDiffusionReaction
  image_size: 128
  sample_limit: 500
  T_in: 1
  T_out: 10
  train_ratio: 0.8
  val_ratio: 0.15
  test_ratio: 0.05
  time_step_start: 0
  time_step_end: 100
  time_step_stride: 1
  normalize: true
  augmentation:
    enabled: false
  dataloader:
    batch_size: 64
    val_batch_size: 64
    test_batch_size: 32
    num_workers: 8
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 8
    drop_last: true

observation:
  mode: sr
  scale_factor: 2
  blur_sigma: 1.0
  kernel_size: 5
  boundary: mirror

model:
  name: ARWrapper
  base_model: SwinUNet
  in_channels: 2
  out_channels: 2
  img_size: 128
  patch_size: 4
  window_size: 8
  depths: [1, 1, 2, 1]
  num_heads: [2, 4, 8, 16]
  embed_dim: 96
  mlp_ratio: 4.0
  drop_rate: 0.0
  attn_drop_rate: 0.0
  drop_path_rate: 0.0
  ar_config:
    detach_rollout: true
    scheduled_sampling: false
    teacher_forcing_ratio: 1.0

training:
  epochs: 3
  batch_size: 64
  gradient_accumulation_steps: 1
  val_check_interval: 1.0
  enable_checkpointing: true
  enable_progress_bar: false
  gradient_clip_val: 1.0
  amp:
    enabled: true
  optimizer:
    name: AdamW
    lr: 3e-4
    weight_decay: 1e-4
    betas: [0.9, 0.999]
  scheduler:
    name: CosineAnnealingLR
    T_max: 3
    eta_min: 1e-6
    warmup_epochs: 0
  checkpoint:
    save_last: true
    save_best: true
    save_every_n_epochs: 0
    max_keep: 2

hardware:
  num_workers: 8
  vram_threshold: 0.95
  memory_cleanup_frequency: 2

logging:
  performance_monitoring:
    log_gpu_memory: true
    log_throughput: true
    log_batch_time: false
    memory_snapshot_frequency: 100
    benchmark:
      enabled: false
  tensorboard:
    save_dir: runs/tensorboard
    name: ar_benchmark_perf
    version: null

validation:
  metrics: ["rel_l2", "mae", "psnr", "ssim"]
  check_val_every_n_epoch: 1

testing:
  enabled: false
  run_final_test: false