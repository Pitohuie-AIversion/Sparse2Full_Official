# SwinTemporalWrapper统一时序模型配置
# 支持AR/NAR/HYBRID三种预测模式，集成时序编码器和调度采样

_target_: models.swin_temporal_wrapper.SwinTemporalWrapper

# 基础模型参数
in_channels: 1
out_channels: 1
img_size: 128

# 时序参数
T_in: 4      # 输入时间步数
T_out: 8     # 输出时间步数

# 预测模式配置
prediction_mode: "ar"  # ar, nar, hybrid
scheduled_sampling: true

# 时序编码器配置
temporal_encoder_config:
  hidden_dim: 64
  num_conv_layers: 3
  kernel_size: 3
  dilation_base: 2
  dropout: 0.1
  activation: "gelu"
  use_residual: true
  use_layer_norm: true

# NAR预测头配置（仅在nar/hybrid模式下使用）
nar_head_config:
  hidden_dim: 128
  num_heads: 8
  num_layers: 3
  dropout: 0.1
  output_projection: "linear"  # linear, conv, mlp
  use_positional_encoding: true
  max_seq_length: 32

# SwinUNet基础配置
swin_config:
  patch_size: 4
  embed_dim: 96
  depths: [2, 2, 6, 2]
  num_heads: [3, 6, 12, 24]
  window_size: 8
  mlp_ratio: 4.0
  qkv_bias: true
  drop_rate: 0.0
  attn_drop_rate: 0.0
  drop_path_rate: 0.1
  use_checkpoint: false

# 调度采样配置
scheduled_sampling_config:
  initial_prob: 1.0      # 初始teacher forcing概率
  final_prob: 0.3        # 最终teacher forcing概率
  decay_type: "exponential"  # linear, exponential, cosine
  decay_steps: 1000      # 衰减步数
  warmup_epochs: 10      # 预热轮数

# 模型名称
name: "swin_temporal_wrapper"