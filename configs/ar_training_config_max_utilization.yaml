# AR训练配置文件 - 最大化硬件利用率版本
# 针对192核CPU、2×46GB GPU显存和1TB内存优化
# 目标：达到95%硬件使用率

experiment:
  name: "AR-DR2D-MaxUtil-SwinUNet-s2025-20251102"
  description: "最大化硬件利用率配置 - 95%目标"
  device: cuda:0
  seed: 2025
  output_dir: runs
  log_every_n_steps: 10

# 数据配置 - 最大化数据吞吐量
data:
  data_path: "data/2D/diffusion-reaction/2D_diff-react_NA_NA.h5"
  dataset_name: RealDiffusionReaction
  image_size: 128
  sample_limit: 5000
  
  # AR特定配置
  T_in: 1
  T_out: 20
  
  # 数据集分割配置
  train_ratio: 0.8
  val_ratio: 0.15
  test_ratio: 0.05
  
  # 时间步配置
  time_step_start: 0
  time_step_end: 100
  time_step_stride: 1
  
  # 观测配置
  observation:
    mode: SR
    sr:
      scale_factor: 2
      blur_sigma: 1.0
      blur_kernel_size: 5
      boundary_mode: mirror
      downsample_mode: area
      align_corners: false
      antialias: true
  
  # 预处理
  normalize: true
  augmentation:
    enabled: false
    flip_prob: 0.0
    rotate_prob: 0.0
    noise_std: 0.0
  
  # 数据加载器 - 最大化CPU和内存利用率
  dataloader:
    batch_size: 64  # 增加批次大小最大化GPU利用率
    val_batch_size: 32
    test_batch_size: 16
    num_workers: 192  # 使用全部192个CPU核心
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 64  # 大幅增加预取因子
    drop_last: true
    multiprocessing_context: 'spawn'
    worker_init_fn: true

# 硬件配置 - 最大化所有硬件资源
hardware:
  num_workers: 192
  vram_threshold: 0.98  # 最大化VRAM使用
  memory_cleanup_frequency: 1
  torch_threads: 192
  mkl_threads: 192
  omp_threads: 192

# 模型配置 - 增强模型复杂度充分利用GPU
model:
  name: ARWrapper
  base_model: SwinUNet
  in_channels: 1
  out_channels: 1
  img_size: 128
  patch_size: 4
  window_size: 8
  depths: [4, 4, 8, 4]  # 大幅增加模型深度
  num_heads: [6, 12, 24, 48]  # 大幅增加注意力头数
  embed_dim: 192  # 大幅增加嵌入维度
  mlp_ratio: 8.0  # 增加MLP比例
  drop_rate: 0.1
  attn_drop_rate: 0.1
  drop_path_rate: 0.3
  
  # AR包装器配置
  ar_config:
    detach_rollout: true
    scheduled_sampling: false
    teacher_forcing_ratio: 1.0

# 训练配置 - 最大化GPU利用率
training:
  epochs: 1000
  batch_size: 64  # 增加批次大小
  gradient_accumulation_steps: 16  # 增加累积步数
  max_epochs: 1000
  val_check_interval: 5
  log_every_n_steps: 10
  enable_checkpointing: true
  enable_progress_bar: true
  precision: "16-mixed"
  sync_batchnorm: true
  find_unused_parameters: true
  
  # 优化器
  optimizer:
    name: adamw
    lr: 3e-3  # 增加学习率
    weight_decay: 1e-4
    betas: [0.9, 0.999]
  
  # 学习率调度
  scheduler:
    name: cosine_annealing
    T_max: 1000
    eta_min: 1e-6
  
  # 训练设置
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm
  
  # GPU优化设置
  memory_cleanup_frequency: 1
  auto_batch_size_reduction: false
  memory_threshold: 0.98
  
  # 混合精度训练
  amp:
    enabled: true
    opt_level: O2
    loss_scale: dynamic
  
  # 课程学习配置
  curriculum:
    enabled: true
    stages:
      - epochs: 200
        T_out: 5
        description: "初期阶段: 预测5步"
      - epochs: 400
        T_out: 10
        description: "中期阶段: 预测10步"
      - epochs: 400
        T_out: 20
        description: "后期阶段: 预测20步"
  
  # 检查点
  checkpoint:
    save_best: true
    save_last: true
    max_keep: 3
    monitor: val_loss
    mode: min
    save_every_n_epochs: 50
  
  # 早停
  early_stopping:
    enabled: true
    patience: 100
    monitor: val_loss
    mode: min
    min_delta: 1e-6

# AR损失配置
loss:
  ar_loss:
    weight: 1.0
    reduction: mean
  reconstruction:
    weight: 1.0
  spectral:
    weight: 0.1
  degradation_consistency:
    weight: 0.5
  gradient_weight: 0.0

# 验证配置
validation:
  check_val_every_n_epoch: 1
  metrics:
    - rel_l2
    - mae
    - psnr
    - ssim
  rollout_steps: [5, 10, 20]
  convergence_criteria:
    target_rel_l2: 0.1
    patience_for_convergence: 10
    min_improvement: 1e-4

# 设备配置 - 双GPU DDP最大化
device:
  accelerator: gpu
  devices: 2
  precision: 16
  strategy: ddp
  compile_model: true
  benchmark: true
  deterministic: false
  sync_batchnorm: true
  find_unused_parameters: true
  
  memory_management:
    gradient_accumulation_steps: 16
    memory_cleanup_frequency: 1
    auto_batch_size_reduction: false
    memory_threshold: 0.98
    enable_memory_efficient_attention: true
    gradient_checkpointing: true  # 启用梯度检查点节省显存

# 日志配置
logging:
  experiment_name: "AR-DR2D-MaxUtil-SwinUNet-s2025"
  version: null
  default_hp_metric: false
  log_model: false
  
  performance_monitoring:
    log_gpu_memory: true
    log_throughput: true
    log_batch_time: true
    memory_snapshot_frequency: 20
  
  tensorboard:
    save_dir: runs/tensorboard
    name: ar_training_max_util
    version: null
  
  visualization:
    save_samples_every_n_epochs: 25
    num_samples_to_save: 8
    save_training_curves: true
    save_rollout_visualization: true

# 随机种子
seed: 2025

# 测试配置
testing:
  enabled: true
  run_final_test: true
  save_predictions: true
  compute_detailed_metrics: true
  batch_size: 16  # 测试时使用较小批次
  save_visualizations: true
  num_visualization_samples: 10
  fast_mode: false
  skip_complex_metrics: false
  minimal_logging: false

# 数据增强配置
data_augmentation:
  enable: false
  random_rotation: 
    enable: false
    degrees: [-5, 5]
  random_flip:
    enable: false
    horizontal: 0.5
    vertical: 0.3
  gaussian_noise:
    enable: false
    std: 0.01
  normalize_per_sample: false
  compute_statistics: false

# 高级优化配置
advanced_optimization:
  cpu_affinity: true
  numa_optimization: true
  gpu_memory_fraction: 0.98
  allow_growth: false
  data_pipeline_optimization: true
  async_data_loading: true
  torch_compile: true
  compile_mode: "max-autotune"
  memory_mapped_dataset: true
  shared_memory: true