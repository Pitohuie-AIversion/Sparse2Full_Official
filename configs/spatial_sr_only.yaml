# 纯空间超分辨率恢复配置文件
# 遵循开发手册黄金法则：观测算子H与DC一致性优先
# 单帧处理，无时序依赖，轻量级配置便于快速验证

experiment:
  name: "Spatial-SR-Only-u-DR2D-256-SwinUNet-s42"
  description: "纯空间超分辨率恢复 - 单帧处理，无时序，AR损失禁用，仅u分量"
  device: cpu
  seed: 42
  output_dir: runs
  log_every_n_steps: 10

# 日志配置 - 启用TensorBoard可视化
logging:
  use_tensorboard: true  # 启用训练过程可视化
  use_wandb: false
  log_level: INFO
  save_code_snapshot: true

# 数据配置 - 纯空间恢复
data:
  data_path: "data/2D/diffusion-reaction/2D_diff-react_NA_NA.h5"
  dataset_name: RealDiffusionReaction
  component: u  # 指定使用u分量（第一个通道），忽略v分量
  img_size: 256  # 输入图像尺寸 - 修正为256以匹配实际数据
  channels: 1    # 单通道数据 - 只使用数据集的一个通道
  
  # 纯空间恢复：单帧输入输出
  T_in: 1        # 单帧输入
  T_out: 1       # 单帧输出 - 关键修改：移除时序预测
  
  # 数据集分割
  train_ratio: 0.8
  val_ratio: 0.15
  test_ratio: 0.05
  
  # 时间步配置 - 限制范围以聚焦空间恢复
  time_step_start: 0
  time_step_end: 500  # 减少时间步范围，专注空间恢复
  time_step_stride: 5  # 增大步长，减少相关性
  
  # 轻量级设置：限制样本数量便于快速验证
  sample_limit: 50  # Debug模式：限制样本数量
  normalize_sample_size: 32  # 减少归一化采样量
  
  # 预处理配置
  preprocessing:
    normalize: true      # 启用标准化
    cache_data: false    # 禁用数据缓存以减少内存占用
  
  # 数据增强 - 适度的空间增强
  augmentation:
    enabled: true
    flip_prob: 0.5      # 水平翻转
    rotate_prob: 0.3    # 旋转增强
    noise_std: 0.01     # 轻度高斯噪声
    cutout_prob: 0.1    # 减少cutout使用频率
    cutout_size: 8      # 减小cutout尺寸
    mixup_alpha: 0.0    # 禁用mixup（不适合空间恢复）
    color_jitter: 0.0   # 禁用颜色抖动（单通道数据）

  # 数据加载器配置 - 轻量级
  dataloader:
    batch_size: 4        # 适中的批次大小
    val_batch_size: 4
    test_batch_size: 4
    num_workers: 2       # 启用多worker但保持轻量
    pin_memory: false
    persistent_workers: false
    prefetch_factor: 2   # 减少预取因子
    drop_last: true
    timeout: 30
    shuffle: true
    
    # 内存优化
    cache_dataset: false
    preload_data: false
    shared_memory: false  # 禁用共享内存以减少复杂度
    memory_map_dataset: false
    
    # 缓存配置 - 全部禁用以保持轻量
    window_cache_enabled: false
    window_cache_max_gb: 0
    batch_cache_enabled: false
    batch_cache_max_gb: 0
    cache_lru_size: 0
    prefill_cache_on_setup: false

  # 数据键名 - 只使用u分量（第一个通道）
  keys: ["0000"]  # 只使用u分量，v分量忽略

# 观测算子配置 - 严格遵循黄金法则：H与DC一致性
# 观测生成与训练DC使用完全相同的配置
observation:
  mode: sr           # 空间超分辨率模式
  scale_factor: 2    # 2倍超分辨率
  blur_sigma: 1.0    # 高斯模糊标准差
  kernel_size: 5     # 模糊核大小
  downsample_interpolation: area  # 下采样插值方法
  boundary: mirror   # 边界处理策略
  crop_size: null    # 禁用裁剪（纯SR任务）
  crop_box: null

# 数据模块观测配置 - 保持一致性
data_observation:
  mode: sr
  scale_factor: 2
  blur_sigma: 1.0
  kernel_size: 5
  downsample_interpolation: area
  boundary: mirror
  crop_size: null
  crop_box: null

# 硬件配置 - CPU优化
hardware:
  num_workers: 2
  vram_threshold: 0.90
  memory_cleanup_frequency: 10
  
  # CPU线程配置 - 适度并行
  torch_threads: 8
  mkl_threads: 8
  omp_threads: 8
  
  cpu:
    numexpr_threads: 8
    mkl_threads: 8
    omp_threads: 8
    torch_threads: 8
    blas_threads: 8
    interop_threads: 2
    openblas_threads: 8
    prefetch_distance: 16
    cpu_affinity: false  # 禁用CPU亲和性以简化配置
    thread_pool_size: 16
    cpu_intensive_mode: false  # 禁用CPU密集型模式
    max_cpu_utilization: 0.80  # 降低CPU利用率目标
    parallel_data_loading: true
    async_data_processing: false  # 禁用异步处理
    numa_aware: false
    memory_interleaving: false
  
  memory:
    memory_threshold: 0.90
    auto_batch_size: true
    gradient_accumulation_steps: 1
    empty_cache_frequency: 100
    max_memory_allocated: 0.90
    memory_fraction: 0.90
    allow_tf32: false
    cudnn_benchmark: false
    aggressive_memory_usage: false
    disable_memory_cleanup: false
    memory_efficient: true
    cache_dataset: false
    preload_data: false
    memory_map_dataset: false
    pin_memory_device: null
    shared_memory: false
    buffer_size: "8GB"  # 减少缓冲区大小

# 轻量级模型 - 针对单分量u的SwinUNet
model:
  name: SwinUNet
  in_channels: 4     # baseline(1) + mask(1) + coords(2) = 4通道 - 只处理u分量
  out_channels: 1    # 单通道输出 - 只预测u分量
  use_coords: true   # 启用坐标编码（需要2个额外通道）
  img_size: 256      # 与数据配置保持一致 - 修正为256
  patch_size: 4      # 标准patch大小
  window_size: 8     # 标准window大小
  
  # 轻量级架构配置
  depths: [1, 1, 1, 1]      # 最小深度配置
  num_heads: [2, 4, 8, 16]  # 标准注意力头配置
  embed_dim: 32            # 减少嵌入维度以降低计算量
  mlp_ratio: 2.0           # 减少MLP比例
  
  # Dropout配置 - 保守设置
  drop_rate: 0.0           # 禁用dropout以简化训练
  attn_drop_rate: 0.0
  drop_path_rate: 0.0

# 训练配置 - 优化的纯空间恢复训练
training:
  epochs: 50               # 适度的训练轮数
  batch_size: 4
  gradient_accumulation_steps: 1
  max_epochs: 100
  
  # 验证配置
  val_check_interval: 0.25  # 每25%训练轮次进行验证
  log_every_n_steps: 10     # 频繁日志记录
  enable_checkpointing: true
  enable_progress_bar: true
  precision: "32"
  
  # 内存和性能优化
  memory_cleanup_frequency: 10
  auto_batch_size_reduction: true
  memory_threshold: 0.90
  
  # 优化器配置 - 遵循黄金法则
  optimizer:
    name: "AdamW"
    lr: 0.001          # 标准学习率
    weight_decay: 0.01 # 标准权重衰减
    betas: [0.9, 0.999]
    eps: 1e-8
    amsgrad: false
    fused: false
    foreach: false
  
  # 学习率调度 - 余弦退火
  scheduler:
    name: "CosineAnnealingLR"
    T_max: 50          # 与训练轮数匹配
    eta_min: 1e-6
  
  # 梯度裁剪 - 遵循黄金法则
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm
  
  # 高级优化 - 禁用以保持稳定性
  compile_model: false
  use_fused_adam: false
  torch_compile: false
  gradient_checkpointing: false
  
  # 混合精度 - 禁用以保持数值稳定性
  amp:
    enabled: false
    init_scale: 65536.0
    growth_factor: 2.0
    backoff_factor: 0.5
    growth_interval: 1000
  
  # 课程学习 - 禁用（纯空间恢复不需要）
  curriculum:
    enabled: false
  
  # 检查点配置
  checkpoint:
    save_best: true
    save_last: true
    max_keep: 2        # 减少检查点保留数量
    monitor: val_loss
    mode: min
    save_every_n_epochs: 10
  
  # 早停配置
  early_stopping:
    enabled: true
    patience: 15         # 适度耐心值
    monitor: val_loss
    mode: min
    min_delta: 1e-4

# 损失配置 - 纯空间恢复损失函数
loss:
  # AR损失 - 禁用（关键修改）
  ar_loss:
    weight: 0.0       # 完全禁用AR损失
    reduction: mean
  
  # 重构损失 - 主要损失函数
  reconstruction:
    weight: 1.0       # 主要损失权重
  
  # 频域损失 - 适度权重
  spectral:
    weight: 0.1       # 低频频域损失
  
  # 数据一致性损失 - 遵循黄金法则
  data_consistency:
    weight: 0.5       # DC损失权重
  
  # 梯度损失 - 禁用
  gradient_weight: 0.0

# 验证配置
validation:
  check_val_every_n_epoch: 1
  val_check_interval: 0.25
  
  # 验证指标 - 专注空间恢复质量
  metrics:
    - rel_l2      # 相对L2误差
    - mae         # 平均绝对误差
    - psnr        # 峰值信噪比
    - ssim        # 结构相似性
  
  # AR验证 - 禁用
  rollout_steps: []  # 空列表：禁用rollout验证
  
  # 收敛标准
  convergence_criteria:
    target_rel_l2: 0.1      # 合理的目标误差
    patience_for_convergence: 10
    min_improvement: 1e-4

# 测试配置
testing:
  enabled: true
  run_final_test: true
  batch_size: 4
  save_visualizations: true
  metrics: [rel_l2, mae, psnr, ssim]
  rollout_steps: []  # 禁用rollout测试

# 设备配置
device:
  accelerator: cpu
  devices: 1
  precision: "32"
  strategy: null
  compile_model: false
  channels_last: false
  
  memory_management:
    gradient_accumulation_steps: 1
    memory_cleanup_frequency: 100
    auto_batch_size_reduction: true
    memory_threshold: 0.90
    enable_memory_efficient_attention: false

# 性能监控
performance_monitoring:
  enabled: true
  log_gpu_utilization: false  # CPU环境禁用GPU监控
  log_cpu_utilization: true
  log_iowait: true
  report_interval_seconds: 30
  
  # 自适应调优阈值
  cpu_low_threshold: 0.70     # 降低CPU阈值
  iowait_high_threshold: 0.15
  num_workers_step: 1         # 小步调整
  prefetch_factor_step: 1
  batch_size_step: 2

# 可视化配置 - 启用详细可视化
visualization:
  enabled: true               # 启用可视化
  save_test_visualizations: true
  num_test_samples: 8         # 增加可视化样本数
  formats: ['png', 'pdf']     # 支持多种格式
  
  # 可视化详细配置
  plot_settings:
    figsize: [12, 8]         # 图尺寸
    dpi: 150                 # 分辨率
    colormap: 'viridis'      # 颜色映射
    include_spectrum: true   # 包含频谱分析
    include_error_map: true  # 包含误差图

# 基准测试 - 禁用以保持轻量
benchmark:
  enabled: false
  warmup_steps: 0
  measure_steps: 0
  report_interval: 0
  max_runtime_seconds: 0
  run_before_training: false
  num_batches: 0