# Stage 3: Joint Fine-tuning (Unfreeze All)
experiment:
  name: AR-DR2D-Stage3-VideoSwin-SRx4-JointFineTune
  description: "Stage 3 Joint Fine-tuning: Unfreeze both spatial and temporal modules"
  device: cuda
  seed: 2025
  output_dir: runs_drd_paper/${experiment.name}
  precision: bf16-mixed

device:
  accelerator: "cuda"
  devices: 2
  precision: "bf16-mixed"

# AR & Sequential Model Configuration
ar:
  enabled: true

sequential:
  enabled: true
  model_type: "SequentialSpatiotemporalModel"
  
  # Stage 3 specific: No pretrain epochs, jump to joint training
  spatial_pretrain_epochs: 0
  temporal_pretrain_epochs: 0  
  num_epochs: 100  # Fine-tuning typically needs fewer epochs
  
  spatial:
    in_channels: 1
    spatial_feature_dim: 64
    out_channels: 1
    img_size: [128, 128]
    backbone_type: "edsr"
    backbone_config:
      n_feats: 64
      n_resblocks: 32
      res_scale: 0.1
      upscale: 1
    # Load Stage 1 checkpoint for Spatial
    pretrained_path: "runs_drd_paper/AR-DR2D-Stage1-EDSR-SRx4-model_EDSR-s2025-20260116/best.ckpt"
    # IMPORTANT: Unfreeze spatial backbone
    freeze: false 
    
  temporal:
    spatial_feature_dim: 64
    temporal_dim: 96
    out_channels: 1
    img_size: [128, 128]
    backend: "video_swin"
    num_heads: 4
    num_layers: 2
    window_size: [2, 8, 8]
    dropout: 0.1
    # Load weights from Stage 2 best checkpoint
    pretrained_path: "runs_drd_paper/AR-DR2D-Stage2-VideoSwin-SRx4-model_unknown-s2025-20260116/best.ckpt"

  consistency:
    enabled: true

  training:
    two_stage_training: false # Disable stage switching logic, just train all
    spatial_loss_weight: 1.0  # Enable spatial supervision
    temporal_loss_weight: 1.0 # Enable temporal supervision
    teacher_forcing_cap: 0.0  # Full autoregressive for fine-tuning

# Data Configuration (Same as Stage 2)
data:
  data_path: "data/DR2D/2D_diff-react_NA_NA.h5"
  dataset_name: "RealDiffusionReaction"
  img_size: 128
  keys: ["data"]
  component: "u"
  use_official_format: true
  splits_dir: "splits"
  target_channels: 1
  input_channels: 1
  T_in: 10
  T_out: 1
  time_step_start: 0
  time_step_end: 101
  time_step_stride: 10
  
  observation:
    mode: "SR"
    sr:
      scale_factor: 4
      blur_sigma: 1.0
      blur_kernel_size: 5
      boundary_mode: "mirror"
      downsample_mode: "area"
      align_corners: false
      antialias: true

  dataloader:
    batch_size: 8
    num_workers: 8
    val_batch_size: 8
    test_batch_size: 1
    pin_memory: false
    persistent_workers: true
    prefetch_factor: 2
    drop_last: true
    shuffle: true
  max_samples: 512

# Training Configuration (Lower LR for Fine-tuning)
training:
  epochs: 100
  batch_size: 8
  gradient_accumulation_steps: 3
  gradient_clip_val: 1.0
  amp:
    enabled: true
    autocast_dtype: "bfloat16"
  
  degradation:
    mode: "sr"
    sr:
      scale_factor: 4
      blur_sigma: 1.0
      blur_kernel_size: 5
      boundary_mode: "mirror"
      downsample_mode: "area"
      align_corners: false
      antialias: true

  loss_weights:
    reconstruction: 1.0
    spectral: 0.5
    data_consistency: 1.0

  optimizer:
    name: "AdamW"
    lr: 5.0e-5  # 10x smaller than Stage 2 (5e-4 -> 5e-5)
    weight_decay: 1.0e-4

  scheduler:
    name: "CosineAnnealingLR"
    T_max: 100
    eta_min: 1.0e-7
    warmup_epochs: 5

  early_stopping:
    enabled: true
    patience: 20
    min_delta: 1.0e-5
    monitor: "val_loss"

  checkpoint:
    save_last: true
    save_best: true
    save_every_n_epochs: 0
    max_keep: 2

validation:
  check_val_every_n_epoch: 5
  metrics: ["rel_l2", "mae", "psnr", "ssim"]

logging:
  experiment_name: "AR-DR2D-Stage3-VideoSwin-SRx4-JointFineTune"
  visualization:
    save_samples_every_n_epochs: 20
    num_samples_to_save: 5

testing:
  enabled: true
  run_final_test: true
  save_predictions: false
  compute_detailed_metrics: true
  batch_size: 512
  save_visualizations: true
  num_visualization_samples: 3
