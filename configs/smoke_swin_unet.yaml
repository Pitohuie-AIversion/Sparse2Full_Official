data:
  use_synthetic_data: true
  T_in: 1
  T_out: 1
  channels: 1
  img_size: 128
  dataloader:
    batch_size: 2
    val_batch_size: 2
    test_batch_size: 1
    num_workers: 0
    pin_memory: false
    persistent_workers: false
    prefetch_factor: null
    drop_last: true
    shuffle: true

model:
  name: swin_unet
  in_channels: 1
  out_channels: 1
  img_size: 128
  embed_dim: 96
  depths: [2, 2, 6, 2]
  window_size: 8
  patch_size: 4

training:
  epochs: 1
  batch_size: 2
  torch_compile: false

experiment:
  precision: 16-mixed
  name: smoke_swin_unet
  output_dir: runs/AR-DR2D-Smoke