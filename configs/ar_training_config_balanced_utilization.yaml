# AR训练配置文件 - 平衡硬件利用率版本
# 针对192核CPU、2×46GB GPU显存和1TB内存优化
# 目标：达到80-85%硬件使用率，避免OOM

experiment:
  name: "AR-DR2D-BalancedUtil-SwinUNet-s2025-20251102"
  description: "平衡硬件利用率配置 - 80-85%目标"
  device: cuda:0
  seed: 2025
  output_dir: runs
  log_every_n_steps: 10

# 数据配置 - 优化数据吞吐量
data:
  data_path: "data/2D/diffusion-reaction/2D_diff-react_NA_NA.h5"
  dataset_name: RealDiffusionReaction
  image_size: 128
  sample_limit: 5000
  
  # AR特定配置
  T_in: 1
  T_out: 20
  
  # 数据集分割配置
  train_ratio: 0.8
  val_ratio: 0.15
  test_ratio: 0.05
  
  # 时间步配置
  time_step_start: 0
  time_step_end: 100
  time_step_stride: 1
  
  # 观测配置
  observation:
    mode: SR
    sr:
      scale_factor: 2
      blur_sigma: 1.0
      blur_kernel_size: 5
      boundary_mode: mirror
      downsample_mode: area
      align_corners: false
      antialias: true
  
  # 预处理
  normalize: true
  augmentation:
    enabled: false
    flip_prob: 0.0
    rotate_prob: 0.0
    noise_std: 0.0
  
  # 数据加载器 - 平衡CPU和内存利用率
  dataloader:
    batch_size: 32  # 减少批次大小避免OOM
    val_batch_size: 16
    test_batch_size: 8
    num_workers: 128  # 使用2/3的CPU核心
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 32  # 适中的预取因子
    drop_last: true
    multiprocessing_context: 'spawn'
    worker_init_fn: true

# 硬件配置 - 平衡所有硬件资源
hardware:
  num_workers: 128
  vram_threshold: 0.85  # 保守的VRAM使用
  memory_cleanup_frequency: 1
  torch_threads: 128
  mkl_threads: 128
  omp_threads: 128

# 模型配置 - 平衡模型复杂度和GPU利用率
model:
  name: ARWrapper
  base_model: SwinUNet
  in_channels: 1
  out_channels: 1
  img_size: 128
  patch_size: 4
  window_size: 8
  depths: [2, 2, 6, 2]  # 适中的模型深度
  num_heads: [3, 6, 12, 24]  # 适中的注意力头数
  embed_dim: 96  # 适中的嵌入维度
  mlp_ratio: 4.0  # 标准MLP比例
  drop_rate: 0.1
  attn_drop_rate: 0.1
  drop_path_rate: 0.2
  
  # AR包装器配置
  ar_config:
    detach_rollout: true
    scheduled_sampling: false
    teacher_forcing_ratio: 1.0

# 训练配置 - 平衡GPU利用率
training:
  epochs: 1000
  batch_size: 32  # 适中的批次大小
  gradient_accumulation_steps: 8  # 适中的累积步数
  max_epochs: 1000
  val_check_interval: 5
  log_every_n_steps: 10
  enable_checkpointing: true
  enable_progress_bar: true
  precision: "16-mixed"
  sync_batchnorm: true
  find_unused_parameters: true
  
  # 优化器
  optimizer:
    name: adamw
    lr: 2e-3  # 适中的学习率
    weight_decay: 1e-4
    betas: [0.9, 0.999]
  
  # 学习率调度
  scheduler:
    name: cosine_annealing
    T_max: 1000
    eta_min: 1e-6
  
  # 训练设置
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm
  
  # GPU优化设置
  memory_cleanup_frequency: 1
  auto_batch_size_reduction: true  # 启用自动批次大小减少
  memory_threshold: 0.85
  
  # 混合精度训练
  amp:
    enabled: true
    opt_level: O1  # 更保守的混合精度
    loss_scale: dynamic
  
  # 课程学习配置
  curriculum:
    enabled: true
    stages:
      - epochs: 200
        T_out: 5
        description: "初期阶段: 预测5步"
      - epochs: 400
        T_out: 10
        description: "中期阶段: 预测10步"
      - epochs: 400
        T_out: 20
        description: "后期阶段: 预测20步"

# 损失函数配置
loss:
  reconstruction:
    name: mse
    weight: 1.0
  
  spectral:
    name: spectral_loss
    weight: 0.5
    low_freq_modes: 16
    
  degradation_consistency:
    name: dc_loss
    weight: 1.0

# 评估配置
evaluation:
  metrics:
    - rel_l2
    - mae
    - psnr
    - ssim
    - spectral_rmse
  
  save_predictions: true
  save_visualizations: true
  
  # 可视化配置
  visualization:
    num_samples: 5
    save_format: png
    dpi: 300

# 检查点配置
checkpoint:
  save_top_k: 3
  monitor: val_rel_l2
  mode: min
  save_last: true
  filename: "epoch_{epoch:03d}_val_rel_l2_{val_rel_l2:.4f}"

# 早停配置
early_stopping:
  monitor: val_rel_l2
  patience: 50
  mode: min
  min_delta: 1e-4

# 日志配置
logging:
  log_dir: logs
  experiment_name: ${experiment.name}
  log_every_n_steps: ${training.log_every_n_steps}
  
  # TensorBoard配置
  tensorboard:
    enabled: true
    log_graph: false
    
  # CSV日志配置
  csv:
    enabled: true
    
# 分布式训练配置
distributed:
  strategy: ddp
  accelerator: gpu
  devices: 2
  num_nodes: 1
  sync_batchnorm: true
  find_unused_parameters: true

# 内存管理配置
memory:
  gradient_accumulation_steps: 8
  memory_cleanup_frequency: 1
  auto_batch_size_reduction: true
  memory_threshold: 0.85
  shared_memory: true
  
  # 数据缓存配置
  cache:
    enabled: true
    cache_size: 100  # GB，使用100GB内存缓存
    preload_data: true
    
  # 内存映射配置
  memory_map:
    enabled: true
    map_size: 200  # GB，使用200GB内存映射

# 性能监控配置
monitoring:
  gpu_memory: true
  system_memory: true
  cpu_usage: true
  disk_io: true
  network_io: false
  
  # 资源使用报告
  resource_report:
    enabled: true
    interval: 100  # 每100步报告一次
    
# 调试配置
debug:
  enabled: false
  save_intermediate: false
  profile_memory: false
  profile_compute: false