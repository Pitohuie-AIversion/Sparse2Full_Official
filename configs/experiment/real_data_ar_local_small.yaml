defaults:
  - _self_

experiment:
  name: "Real-DR2D-AR-local-small"
  description: "Local small synthetic DR2D for DDP sanity"
  device: "cuda"
  seed: 2025
  output_dir: "runs"
  log_every_n_steps: 5
  precision: "fp32"

data:
  data_path: "data/DR2D/2D_diff-react_NA_NA_small.h5"
  T_in: 1
  T_out: 5
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  time_step_start: 0
  time_step_end: 49
  time_step_stride: 1
  normalize: true
  augmentation: { enabled: false }
  dataloader:
    batch_size: 4
    val_batch_size: 4
    test_batch_size: 1
    num_workers: 0
    pin_memory: false
    persistent_workers: false
    prefetch_factor: null
  drop_last: true
  shuffle: true

loss:
  reconstruction:
    weight: 1.0
  spectral:
    weight: 0.5
    low_freq_modes: 16
    use_rfft: false
    normalize: false
    boundary_mode: mirror
  data_consistency:
    weight: 1.0
  gradient_weight: 0.0

observation:
  mode: sr
  scale_factor: 2
  blur_sigma: 1.0
  kernel_size: 5
  boundary: mirror

model:
  name: "SwinUNet"
  in_channels: 2
  out_channels: 2
  img_size: 128
  patch_size: 4
  window_size: 8
  depths: [2, 2, 6, 2]
  num_heads: [3, 6, 12, 24]
  embed_dim: 96
  mlp_ratio: 4.0
  drop_rate: 0.0
  attn_drop_rate: 0.0
  drop_path_rate: 0.1

training:
  epochs: 15
  batch_size: 4
  optimizer:
    name: "AdamW"
    lr: 1e-4
    weight_decay: 1e-4
    betas: [0.9, 0.999]
  scheduler:
    name: "CosineAnnealingLR"
    T_max: 2
    eta_min: 1e-6
  gradient_clip_val: 0.5
  amp:
    enabled: false
    opt_level: "O0"

hardware:
  num_workers: 0
  pin_memory: false
  persistent_workers: false

testing:
  enabled: true
  run_final_test: true
  batch_size: 1