# AR训练配置文件
# 基于之前成功的配置，适配当前环境

experiment:
  name: "AR-DR2D-T20-SwinUNet-s2025"
  description: "20步AR自回归训练 - 扩散反应数据"
  device: cuda:0
  seed: 2025
  output_dir: runs
  log_every_n_steps: 10

# 数据配置
data:
  data_path: "data/2D/diffusion-reaction/2D_diff-react_NA_NA.h5"
  dataset_name: RealDiffusionReaction
  # 移除splits_dir，因为RealDiffusionReactionDataModule不使用splits文件
  image_size: 128  # 匹配实际数据分辨率
  sample_limit: 10000
  
  # AR特定配置
  T_in: 1      # 输入时间步数
  T_out: 20    # 输出时间步数（20步AR预测）
  
  # 数据集分割配置 - 匹配RealDiffusionReactionDataModule参数
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  
  # 时间步配置
  time_step_start: 0
  time_step_end: 980  # 使用前980个时间步
  time_step_stride: 1
  
  # 观测配置 - 降采样输入
  observation:
    mode: SR  # 超分辨率模式
    scale_factor: 2        # 与训练器一致：obs_cfg.get('scale_factor')
    blur_sigma: 1.0        # 与训练器一致：obs_cfg.get('blur_sigma')
    kernel_size: 5         # 与退化算子一致：params['kernel_size']
    boundary: mirror       # 与退化算子一致：boundary ∈ {mirror|wrap|zero}
  
  # 预处理
  normalize: true
  augmentation:
    enabled: false
    flip_prob: 0.0
    rotate_prob: 0.0
    noise_std: 0.0
  
  # 数据加载器 - 平衡CPU和内存利用
  dataloader:
    batch_size: 256  # 降低批次大小避免OOM，通过梯度累积保持有效批次
    num_workers: 180  # 保持高工作进程数
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 16  # 保持高预取因子
    drop_last: true
    # 启用CPU密集型数据处理
    multiprocessing_context: 'spawn'  # 优化多进程上下文
    worker_init_fn: true  # 启用worker初始化函数
  
# 硬件配置 - 平衡CPU内存利用
hardware:
  num_workers: 180  # 与dataloader保持一致
  vram_threshold: 0.92  # 降低VRAM使用阈值避免OOM
  memory_cleanup_frequency: 2  # 更频繁的内存清理
  # CPU优化设置
  torch_threads: 8  # 设置PyTorch线程数
  mkl_threads: 8    # 设置MKL线程数
  omp_threads: 8    # 设置OpenMP线程数

# 模型配置 - 适中复杂度以充分利用GPU算力
model:
  name: ARWrapper
  base_model: SwinUNet
  in_channels: 1  # 使用单通道数据（只使用u通道）
  out_channels: 1
  img_size: 128  # 匹配实际数据分辨率
  patch_size: 4
  window_size: 8
  depths: [2, 2, 4, 2]  # 适中的深度
  num_heads: [3, 6, 12, 24]  # 适中的注意力头数
  embed_dim: 96  # 适中的嵌入维度
  mlp_ratio: 4.0  # 标准MLP比例
  drop_rate: 0.1
  attn_drop_rate: 0.1
  drop_path_rate: 0.2
  
  # AR包装器配置
  ar_config:
    detach_rollout: true
    scheduled_sampling: false
    teacher_forcing_ratio: 1.0
  
  # AR包装器使用上面的模型参数，移除重复的base_params配置

# 训练配置 - 极限显存利用
training:
  epochs: 1  # 测试配置：仅运行1个epoch
  batch_size: 256  # 降低批次大小避免OOM，通过梯度累积保持有效批次
  gradient_accumulation_steps: 16  # 增加梯度累积步数补偿较小批次 (256*16=4096有效批次)
  max_epochs: 100
  val_check_interval: 0.25
  log_every_n_steps: 5  # 更频繁的日志记录增加CPU负载
  enable_checkpointing: true
  enable_progress_bar: true
  precision: "16-mixed"  # 保持混合精度
  # 并行计算优化
  sync_batchnorm: true  # 启用同步批归一化
  find_unused_parameters: true  # 启用未使用参数检测
  
  # 优化器 - 针对超大批次优化
  optimizer:
    name: adamw
    lr: 5e-4  # 调整学习率适应512批次大小
    weight_decay: 1e-4
    betas: [0.9, 0.999]
  
  # 学习率调度
  scheduler:
    name: cosine_annealing
    T_max: 1  # 单epoch测试
    eta_min: 1e-7
  
  # 训练设置 - 优化内存和性能
  gradient_clip_val: 1.0  # 适当放宽梯度裁剪
  gradient_clip_algorithm: norm
  
  # GPU优化设置 - 极限显存利用
  memory_cleanup_frequency: 3  # 更频繁的内存清理
  auto_batch_size_reduction: true
  memory_threshold: 0.95  # 最大化显存利用阈值
  
  # 混合精度训练
  amp:
    enabled: true
    opt_level: O1  # 保持O1确保稳定性
    loss_scale: dynamic  # 动态损失缩放
  
  # 课程学习配置 - 测试阶段
  curriculum:
    enabled: true
    stages:
      - epochs: 1
        T_out: 5
        description: "测试阶段: 预测5步"
  
  # 检查点 - 测试优化
  checkpoint:
    save_best: true
    save_last: true
    max_keep: 2  # 测试阶段减少保存数量
    monitor: val_loss
    mode: min
    save_every_n_epochs: 1  # 每个epoch都保存用于测试
  
  # 早停 - 测试配置
  early_stopping:
    enabled: false  # 测试阶段禁用早停
    patience: 10
    monitor: val_loss
    mode: min
    min_delta: 1e-6

# AR损失配置
loss:
  # AR重建损失权重（compute_ar_total_loss消费）
  rel2_weight: 1.0
  mae_weight: 0.1
  
  # 频谱损失（在原值域计算）
  spectral:
    weight: 0.1
    low_freq_modes: 16
    use_rfft: false
    normalize: false
    boundary_mode: mirror
  
  # 数据一致性损失（在原值域计算）
  data_consistency:
    weight: 0.5
  
  # 可选梯度损失（z-score域）
  gradient_weight: 0.0

# 验证配置
validation:
  check_val_every_n_epoch: 1  # 每个epoch都进行验证
  
  metrics:
    - rel_l2
    - mae
    - psnr
    - ssim
    - temporal_consistency
  
  # AR特定验证
  rollout_steps: [5, 10, 20]  # 不同步数的验证
  
  convergence_criteria:
    target_rel_l2: 0.2  # AR任务相对宽松的收敛标准
    patience_for_convergence: 15
    min_improvement: 1e-4

# 设备配置 - 双GPU硬件优化
device:
  accelerator: gpu
  devices: 2  # 使用两张L40显卡
  precision: 16  # 混合精度训练
  strategy: ddp  # 分布式数据并行
  
  # 性能优化设置
  compile_model: false  # 关闭PyTorch编译优化（测试稳定性）
  benchmark: true  # cuDNN benchmark优化
  deterministic: false  # 允许非确定性操作提升性能
  
  # 多GPU优化
  sync_batchnorm: true  # 同步BatchNorm
  find_unused_parameters: false  # DDP优化
  
  # 内存优化 - 激进设置
  memory_management:
    gradient_accumulation_steps: 16  # 与训练配置保持一致
    memory_cleanup_frequency: 2  # 更频繁的内存清理
    auto_batch_size_reduction: true
    memory_threshold: 0.75  # 降低显存使用率阈值避免OOM
    enable_memory_efficient_attention: true  # 启用内存高效注意力
    gradient_checkpointing: true  # 启用梯度检查点

# 日志配置 - 性能监控增强
logging:
  experiment_name: "AR-DR2D-T20-SwinUNet-Test-s2025"
  version: null
  default_hp_metric: false
  log_model: true
  
  # 性能监控
  performance_monitoring:
    log_gpu_memory: true
    log_throughput: true
    log_batch_time: true
    memory_snapshot_frequency: 100
  
  tensorboard:
    save_dir: runs/tensorboard
    name: ar_training_test
    version: null
  
  visualization:
    save_samples_every_n_epochs: 1  # 测试阶段每个epoch保存
    num_samples_to_save: 5
    save_training_curves: true
    save_rollout_visualization: true

# 随机种子
seed: 2025

# 测试配置
testing:
  enabled: true
  run_final_test: true  # 训练完成后自动运行测试
  save_predictions: true  # 保存预测结果
  compute_detailed_metrics: true  # 计算详细指标
  
  # 测试时的特殊设置
  batch_size: 1  # 测试时使用小批次
  save_visualizations: true  # 保存可视化结果
  num_visualization_samples: 5  # 可视化样本数量

# 数据增强配置 - 增加CPU计算负载
data_augmentation:
  enable: true
  # CPU密集型增强操作
  random_rotation: 
    enable: true
    degrees: [-5, 5]
  random_flip:
    enable: true
    horizontal: 0.5
    vertical: 0.3
  gaussian_noise:
    enable: true
    std: 0.01
  # 数值计算密集型操作
  normalize_per_sample: true
  compute_statistics: true