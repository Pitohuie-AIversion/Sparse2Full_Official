# AR训练配置文件 - 最大化GPU内存利用率（95%+）
# 专为双L40 GPU优化，目标内存利用率43-44GB per GPU

experiment:
  name: "AR-DR2D-MaxGPU-Memory-95pct-SwinUNet-s2025"
  description: "最大化GPU内存利用率配置 - 95%+内存使用"
  device: cuda
  seed: 2025
  output_dir: runs
  log_every_n_steps: 20  # 减少日志频率以提升性能

# 设备与并行（DDP）- 最大化内存利用
device:
  accelerator: cuda
  devices: 2
  strategy: ddp
  allow_data_parallel_fallback: true
  precision: bf16-mixed  # BF16减少内存占用，提升性能

# 显式禁用AR时序，改为空间-only模式
ar:
  enabled: false

sequential:
  enabled: false

# 数据配置 - 最大化内存利用
data:
  data_path: "data/2D/diffusion-reaction/2D_diff-react_NA_NA.h5"
  dataset_name: RealDiffusionReaction
  img_size: 128  # 匹配实际数据分辨率
  sample_limit: 2000  # 大幅增加样本数量以填充GPU内存
  
  # AR特定配置
  T_in: 1      # 输入时间步数
  T_out: 1     # 纯空间预测：仅预测单帧
  
  # 数据集分割配置
  train_ratio: 0.8
  val_ratio: 0.15
  test_ratio: 0.05
  
  # 时间步配置 - 最大化时间步数以利用内存
  time_step_start: 0
  time_step_end: 500   # 大幅增加时间步数
  time_step_stride: 1
  
  # 观测配置 - 降采样输入
  observation:
    mode: SR
    sr:
      scale_factor: 2
      blur_sigma: 1.0
      blur_kernel_size: 5
      boundary_mode: mirror
      downsample_mode: area
      align_corners: false
      antialias: true
  
  # 预处理
  normalize: true
  augmentation:
    enabled: false  # 关闭数据增强以减少CPU负载
    flip_prob: 0.0
    rotate_prob: 0.0
    noise_std: 0.0

  # 数据加载器 - 最大化内存配置
  dataloader:
    batch_size: 256        # 最大批次大小（每GPU 128）
    val_batch_size: 256    # 验证批次大小
    test_batch_size: 128   # 测试批次大小
    num_workers: 12        # 最大工作进程数
    pin_memory: true       # 启用页面锁定内存
    persistent_workers: true  # 保持工作进程存活
    prefetch_factor: 16     # 最大预取因子
    drop_last: true        # 丢弃最后不完整批次
    shuffle: true          # 保持数据打乱
    timeout: 300           # 增加超时时间

# 硬件最大化配置
hardware:
  allow_tf32: true              # 启用TF32以提升性能
  memory:
    cudnn_benchmark: true       # 启用CUDNN基准测试
    cudnn_deterministic: false  # 禁用确定性算法以提升性能
    allow_non_tensor_cuda: true  # 允许非张量CUDA操作
    max_split_size_mb: 128     # 优化内存分配

# 模型配置 - 最大化内存版本
model:
  name: SwinUNet
  in_channels: 2    # 双通道数据（u,v）
  out_channels: 2
  img_size: 128
  patch_size: 4
  window_size: 8
  depths: [4, 4, 12, 4]    # 最大化模型深度
  num_heads: [4, 8, 16, 32]  # 最大化注意力头数
  embed_dim: 128           # 最大化嵌入维度
  mlp_ratio: 4.0
  drop_rate: 0.1
  attn_drop_rate: 0.1
  drop_path_rate: 0.3    # 较高drop path率防止过拟合
  
  # AR包装器配置
  ar_config:
    detach_rollout: true
    scheduled_sampling: false
    teacher_forcing_ratio: 1.0

# 训练配置 - 最大化内存利用
training:
  epochs: 300             # 增加训练轮次
  batch_size: 256         # 批次大小（每GPU 128）
  gradient_accumulation_steps: 1  # 双卡下直接满批次
  
  # PyTorch编译优化 - 暂时禁用确保稳定性
  torch_compile: false    # 禁用torch.compile避免初始化问题
  torch_compile_backend: "inductor"  # 使用inductor后端
  torch_compile_mode: "reduce-overhead"  # 减少开销模式
  channels_last: true     # 启用channels_last内存格式
  
  # 训练优化
  dataloader:
    batch_size: 256
    val_batch_size: 256
    test_batch_size: 128
    num_workers: 12
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 16
    drop_last: true
    shuffle: true
  
  # 验证配置
  validation:
    enabled: true
    check_val_every_n_epoch: 10  # 每10轮验证一次，减少验证开销
    save_val_batch_for_viz: false
    log_val_metrics: true
  
  # 优化器配置 - 稳定配置
  optimizer:
    name: "AdamW"
    lr: 0.0008              # 稍低学习率以适应大批量
    weight_decay: 0.0001
    betas: [0.9, 0.999]
    eps: 1e-8
    fused: false           # 禁用融合优化器确保稳定性
    foreach: false         # 禁用foreach优化
  
  # 调度器配置
  scheduler:
    name: "CosineAnnealingLR"
    T_max: 300            # 与总epochs一致
    eta_min: 1e-6
    warmup_epochs: 20     # 增加warmup轮次适应大批量
  
  # 基本训练设置
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm
  
  # AMP配置 - 稳定配置
  amp:
    enabled: true
    autocast_dtype: bfloat16  # L40原生支持BF16
  
  # 检查点配置
  checkpoint:
    save_best: true
    save_last: true
    max_keep: 5           # 减少检查点保留以节省内存
    monitor: val_loss
    mode: min
    save_every_n_epochs: 50  # 减少保存频率
  
  # 早停配置
  early_stopping:
    enabled: true         # 启用早停
    patience: 60          # 增加耐心值
    monitor: val_loss
    mode: min
    min_delta: 1e-4

# 损失配置
loss:
  # AR特定损失
  ar_loss:
    weight: 0.0           # 空间-only模式
    reduction: mean
  
  # 辅助损失
  reconstruction:
    weight: 1.0
  spectral:
    weight: 0.5           # 频谱损失
  degradation_consistency:
    weight: 0.5           # DC一致性损失
  gradient_weight: 0.1    # 梯度损失

# 验证配置
validation:
  check_val_every_n_epoch: 10
  use_observation: false
  
  metrics:
    - rel_l2
    - mae
    - rmse
    - psnr
  
  # AR特定验证
  rollout_steps: [1]
  
  convergence_criteria:
    target_rel_l2: 0.25   # 更严格的收敛标准
    patience_for_convergence: 10
    min_improvement: 1e-4

# 日志配置
logging:
  experiment_name: "AR-DR2D-MaxGPU-Memory-95pct-SwinUNet-s2025"
  version: null
  default_hp_metric: false
  log_model: false
  
  # 性能监控 - 最大化配置
  performance_monitoring:
    log_gpu_memory: true      # 监控GPU内存
    log_throughput: true      # 监控吞吐量
    log_batch_time: true      # 监控批次时间
    log_gpu_utilization: true  # 监控GPU利用率
  
  tensorboard:
    save_dir: runs/tensorboard
    name: ar_training_max_gpu_memory
    version: null
  
  visualization:
    save_samples_every_n_epochs: 100  # 减少可视化频率
    num_samples_to_save: 5
    save_training_curves: true
    save_rollout_visualization: false

# 随机种子
seed: 2025

# 测试配置
testing:
  enabled: true             # 启用测试
  run_final_test: true      # 运行最终测试
  save_predictions: false   # 不保存预测结果以节省内存
  compute_detailed_metrics: true
  
  batch_size: 128         # 测试批次大小
  save_visualizations: false
  num_visualization_samples: 3
  
  fast_mode: false
  skip_complex_metrics: false
  minimal_logging: false

# 系统资源监控
system_monitoring:
  enabled: true
  log_interval: 300       # 每300秒记录一次系统状态
  monitor_gpu_temperature: true
  monitor_cpu_usage: true
  monitor_memory_usage: true
  monitor_disk_io: false   # 禁用磁盘IO监控以减少开销

# 内存优化配置
memory_optimization:
  enabled: true
  clear_cache_every_n_epochs: 10  # 定期清理缓存
  gradient_checkpointing: false   # 禁用梯度检查点以最大化内存使用
  mixed_precision_training: true  # 启用混合精度训练
  memory_efficient_attention: false  # 禁用内存高效注意力以最大化性能