# AR训练配置文件 - 100样本优化版本
# 针对loss停滞问题进行优化

experiment:
  name: "AR-DR2D-100Samples-Optimized-SwinUNet-s2025"
  description: "100样本优化配置 - 解决loss停滞问题"
  device: cuda
  seed: 2025
  output_dir: runs
  log_every_n_steps: 5  # 更频繁的日志监控

# 设备与并行配置
device:
  accelerator: cuda
  devices: 2
  strategy: ddp
  allow_data_parallel_fallback: true
  precision: bf16-mixed

# AR配置 - 保持空间-only模式
ar:
  enabled: false

sequential:
  enabled: false

# 数据配置 - 优化数据使用
data:
  data_path: "data/2D/diffusion-reaction/2D_diff-react_NA_NA.h5"
  dataset_name: RealDiffusionReaction
  img_size: 128
  sample_limit: 100  # 保持100样本
  
  # AR特定配置
  T_in: 1
  T_out: 1
  
  # 数据集分割配置 - 优化分割比例
  train_ratio: 0.8    # 增加训练样本到80个
  val_ratio: 0.15     # 减少验证样本到15个
  test_ratio: 0.05    # 减少测试样本到5个
  
  # 时间步配置
  time_step_start: 0
  time_step_end: 101
  time_step_stride: 1
  
  # 观测配置 - 优化降采样参数
  observation:
    mode: SR
    sr:
      scale_factor: 2
      blur_sigma: 0.8  # 降低模糊强度
      blur_kernel_size: 3  # 减小核大小
      boundary_mode: mirror
      downsample_mode: area
      align_corners: false
      antialias: true
  
  # 预处理优化
  normalize: true
  augmentation:
    enabled: true  # 启用数据增强防止过拟合
    flip_prob: 0.3  # 水平翻转
    rotate_prob: 0.2  # 随机旋转
    noise_std: 0.01  # 添加轻微噪声

  # 数据加载器配置
  dataloader:
    batch_size: 16         # 减小批次大小
    val_batch_size: 15     # 匹配验证集大小
    test_batch_size: 5     # 匹配测试集大小
    num_workers: 4         # 减少工作进程
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 4     # 减少预取
    drop_last: false
    shuffle: true
    timeout: 120

# 硬件配置
hardware:
  allow_tf32: true
  memory:
    cudnn_benchmark: true
    cudnn_deterministic: false

# 模型配置 - 减小模型规模防止过拟合
model:
  name: SwinUNet
  in_channels: 2
  out_channels: 2
  img_size: 128
  patch_size: 4
  window_size: 8
  depths: [2, 2, 6, 2]    # 减小模型深度
  num_heads: [2, 4, 8, 16]  # 减少注意力头数
  embed_dim: 96            # 减少嵌入维度
  mlp_ratio: 4.0
  drop_rate: 0.2           # 增加dropout率
  attn_drop_rate: 0.2      # 增加注意力dropout
  drop_path_rate: 0.3      # 增加drop path率
  
  # AR包装器配置
  ar_config:
    detach_rollout: true
    scheduled_sampling: false
    teacher_forcing_ratio: 1.0

# 训练配置 - 关键优化
training:
  epochs: 200              # 增加训练轮次
  batch_size: 16           # 匹配数据加载器
  gradient_accumulation_steps: 2  # 梯度累积
  
  # PyTorch编译优化
  torch_compile: false
  channels_last: true
  
  # 训练优化
  dataloader:
    batch_size: 16
    val_batch_size: 15
    test_batch_size: 5
    num_workers: 4
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 4
    drop_last: false
    shuffle: true
  
  # 验证配置
  validation:
    enabled: true
    check_val_every_n_epoch: 2  # 每2轮验证一次
    save_val_batch_for_viz: true
    log_val_metrics: true
  
  # 优化器配置 - 关键改进
  optimizer:
    name: "AdamW"
    lr: 0.0001               # 降低学习率10倍
    weight_decay: 0.0005     # 增加权重衰减
    betas: [0.9, 0.999]
    eps: 1e-8
    fused: false
    foreach: false
  
  # 调度器配置 - 改进调度策略
  scheduler:
    name: "CosineAnnealingLR"
    T_max: 200               # 匹配总epochs
    eta_min: 1e-7            # 进一步降低最小LR
    warmup_epochs: 10        # 延长warmup期
  
  # 梯度裁剪 - 更严格的裁剪
  gradient_clip_val: 0.5    # 降低梯度裁剪阈值
  gradient_clip_algorithm: norm
  
  # AMP配置
  amp:
    enabled: true
    autocast_dtype: bfloat16
  
  # 检查点配置
  checkpoint:
    save_best: true
    save_last: true
    max_keep: 5
    monitor: val_loss
    mode: min
    save_every_n_epochs: 10
  
  # 早停配置 - 更严格的早停
  early_stopping:
    enabled: true
    patience: 25             # 增加耐心值
    monitor: val_loss
    mode: min
    min_delta: 5e-4          # 提高改进阈值

# 损失配置 - 启用多损失组合
loss:
  # AR特定损失
  ar_loss:
    weight: 0.0
    reduction: mean
  
  # 重建损失 - 降低权重
  reconstruction:
    weight: 0.7              # 降低重建损失权重
  
  # 频谱损失 - 启用
  spectral:
    weight: 0.2              # 添加频谱损失
    k_max: 16
  
  # 数据一致性损失 - 启用
  degradation_consistency:
    weight: 0.1              # 添加DC损失
  
  # 梯度损失 - 轻微启用
  gradient_weight: 0.05    # 添加轻微梯度损失

# 验证配置
validation:
  check_val_every_n_epoch: 2
  use_observation: false
  
  metrics:
    - rel_l2
    - mae
    - rmse
    - psnr
  
  # AR特定验证
  rollout_steps: [1]
  
  convergence_criteria:
    target_rel_l2: 0.25      # 提高收敛标准
    patience_for_convergence: 5
    min_improvement: 1e-3

# 日志配置 - 增强监控
logging:
  experiment_name: "AR-DR2D-100Samples-Optimized-SwinUNet-s2025"
  version: null
  default_hp_metric: false
  log_model: false
  
  # 性能监控 - 详细监控
  performance_monitoring:
    log_gpu_memory: true
    log_throughput: true
    log_batch_time: true
    log_gpu_utilization: true
  
  # 增强训练监控
  training_monitoring:
    log_gradient_norms: true      # 记录梯度范数
    log_learning_rate: true     # 记录学习率
    log_weight_stats: true       # 记录权重统计
    log_loss_components: true    # 记录损失分量
  
  tensorboard:
    save_dir: runs/tensorboard
    name: ar_training_100samples_optimized
    version: null
  
  visualization:
    save_samples_every_n_epochs: 5
    num_samples_to_save: 10
    save_training_curves: true
    save_rollout_visualization: true

# 随机种子
seed: 2025

# 测试配置
testing:
  enabled: true
  run_final_test: true
  save_predictions: true
  compute_detailed_metrics: true
  
  batch_size: 5
  save_visualizations: true
  num_visualization_samples: 5
  
  fast_mode: false
  skip_complex_metrics: false
  minimal_logging: false