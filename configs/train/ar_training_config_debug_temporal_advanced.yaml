# AR训练配置文件 - 高级时序模型版本
# 基于ARWrapper但增加时序特征提取

experiment:
  name: "AR-DR2D-Advanced-Temporal-s2025"
  description: "ARWrapper + 时序特征提取 - 高级时序建模"
  device: cuda
  seed: 2025
  output_dir: runs
  log_every_n_steps: 5

# 设备与并行
device:
  accelerator: cuda
  devices: 1
  strategy: auto
  allow_data_parallel_fallback: true
  precision: fp32

# 启用分阶段训练策略 - 使用增强版ARWrapper
ar:
  enabled: true
  teacher_forcing_ratio: 0.9
  scheduled_sampling: true
  scheduled_sampling_decay: 0.95

# 简化架构 - 使用增强版ARWrapper而非复杂序列模型
sequential:
  enabled: false

# 使用增强版ARWrapper - 带时序特征提取
model_wrapper:
  enabled: true
  wrapper_type: "ARWrapperWithTemporalFeatures"  # 假设存在增强版本
  temporal_features: true                         # 启用时序特征提取
  temporal_dim: 128                               # 时序特征维度

# 模型配置 - FNO2D基础配置
model:
  name: fno2d
  in_channels: 1
  out_channels: 1
  img_size: 128
  # FNO2D特定参数
  modes1: 12
  modes2: 12
  width: 64
  n_layers: 4
  activation: 'gelu'

# 数据配置
data:
  data_path: "data/2D/diffusion-reaction/2D_diff-react_NA_NA.h5"
  dataset_name: RealDiffusionReaction
  img_size: 128
  keys: ["data"]
  component: u
  use_official_format: true
  splits_dir: splits
  target_channels: 1
  input_channels: 1
  sample_limit: 10
  
  # AR特定配置
  T_in: 1
  T_out: 5
  channels: 1
  
  # 数据集分割配置
  train_ratio: 0.8
  val_ratio: 0.15
  test_ratio: 0.05
  
  # 时间步配置
  time_step_start: 0
  time_step_end: 50
  time_step_stride: 1
  
  # 观测配置
  observation:
    mode: SR
    sr:
      scale_factor: 2
      blur_sigma: 1.0
      blur_kernel_size: 5
      boundary_mode: mirror
      downsample_mode: area
      align_corners: false
      antialias: true
  
  # 预处理
  normalize: true
  augmentation:
    enabled: false

# 训练配置
training:
  epochs: 70
  batch_size: 32
  gradient_accumulation_steps: 4
  
  # FNO2D优化配置
  torch_compile: false
  torch_compile_backend: "inductor"
  torch_compile_mode: "reduce-overhead"
  channels_last: false
  
  # 数据加载器
  dataloader:
    batch_size: 32
  
  # 损失权重
  loss_weights:
    reconstruction: 1.0
    spectral: 0.3
    data_consistency: 0.5
    val_batch_size: 32
    test_batch_size: 16
    num_workers: 2
    pin_memory: true
    persistent_workers: false
    prefetch_factor: 2
    drop_last: false
    shuffle: true
  
  # 验证配置
  validation:
    enabled: true
    check_val_every_n_epoch: 5
    save_val_batch_for_viz: false
    log_val_metrics: true
  
  # FNO2D优化器配置
  optimizer:
    name: "AdamW"
    lr: 0.0005
    weight_decay: 0.0001
    betas: [0.9, 0.999]
    eps: 1e-8
    fused: false
    foreach: false
  
  # FNO2D调度器配置
  scheduler:
    name: "CosineAnnealingLR"
    T_max: 70
    eta_min: 1e-6
    warmup_epochs: 3
  
  # 基本训练设置
  gradient_clip_val: 0.5
  gradient_clip_algorithm: norm
  
  # 禁用AMP
  amp:
    enabled: false
    autocast_dtype: float32
  
  # 课程学习配置
  curriculum:
    enabled: true
    stages:
      - {T_out: 1, epochs: 15}
      - {T_out: 3, epochs: 25}
      - {T_out: 5, epochs: 30}
    teacher_forcing_decay: 0.95
  
  # 检查点配置
  checkpoint:
    save_best: true
    save_last: true
    max_keep: 3
    monitor: val_loss
    mode: min
    save_every_n_epochs: 10
  
  # 早停配置
  early_stopping:
    enabled: false
    patience: 50
    monitor: val_loss
    mode: min
    min_delta: 1e-4

# AR损失配置
loss:
  # AR特定损失
  ar_loss:
    weight: 1.0
    reduction: mean
  
  # 辅助损失
  reconstruction:
    weight: 1.0
  spectral:
    weight: 0.1
  degradation_consistency:
    weight: 0.3
  gradient_weight: 0.0

# 验证配置
validation:
  check_val_every_n_epoch: 5
  use_observation: false
  
  metrics:
    - rel_l2
    - mae
    - degradation_consistency
  
  # AR特定验证
  rollout_steps: [1, 3, 5]
  
  convergence_criteria:
    target_rel_l2: 0.3
    patience_for_convergence: 5
    min_improvement: 5e-4

# 设备配置
hardware:
  allow_tf32: false
  memory:
    cudnn_benchmark: false

# 日志配置
logging:
  experiment_name: "AR-DR2D-Advanced-Temporal-s2025"
  version: null
  default_hp_metric: false
  log_model: false
  
  # 性能监控
  performance_monitoring:
    log_gpu_memory: true
    log_throughput: true
    log_batch_time: true
  
  tensorboard:
    save_dir: runs/tensorboard
    name: ar_training_advanced
    version: null
  
  visualization:
    save_samples_every_n_epochs: 50
    num_samples_to_save: 5
    save_training_curves: true
    save_rollout_visualization: false

# 随机种子
seed: 2025

# 测试配置
testing:
  enabled: false
  run_final_test: false
  save_predictions: false
  compute_detailed_metrics: false
  batch_size: 32
  save_visualizations: false
  num_visualization_samples: 0
  fast_mode: false
  skip_complex_metrics: false
  minimal_logging: false

# 数据增强配置
data_augmentation:
  enable: false