# 纯空间预测训练配置（禁用时间预测，充分利用硬件）
# 遵循黄金法则：观测算子H与训练DC完全一致；统一接口 forward(x[B,C,H,W])->y[B,C,H,W]

experiment:
  name: "SpatialOnly-DR2D-128-SwinUNet-s2025"
  description: "仅空间预测（SR×2），禁用时间预测，BF16+双GPU，充分利用1TB RAM/192核CPU"
  device: cuda  # 自动选择可用GPU
  seed: 2025
  output_dir: runs
  log_every_n_steps: 10
  precision: "bf16-mixed"  # L40 支持 BF16

# 数据配置（单帧空间恢复）
data:
  data_path: "data/2D/diffusion-reaction/2D_diff-react_NA_NA.h5"
  dataset_name: RealDiffusionReaction
  image_size: 128
  channels: 2
  sample_limit: 100  # 快速验证，稍大于debug
  keys: ["u", "v"]
  # 纯空间：单帧输入/输出
  T_in: 1
  T_out: 1
  # 时间范围保留但不参与训练（用于取某一帧）
  time_step_start: 0
  time_step_end: 200
  time_step_stride: 1
  normalize: true
  augmentation:
    enabled: false
    flip_prob: 0.0
    rotate_prob: 0.0
    noise_std: 0.0

# 顶层观测（与训练DC完全一致）
observation:
  mode: SR              # 统一使用大写，避免不支持的 'sr'
  # 兼容不同键名，确保 h_params 构建完整
  scale_factor: 2
  scale: 2
  sigma: 1.0
  blur_sigma: 1.0
  kernel_size: 5
  blur_kernel_size: 5
  boundary: mirror
  boundary_mode: mirror
  downsample_mode: area
  downsample_interpolation: area
  align_corners: false
  antialias: true
  # 同时提供 sr 子字典以兼容另一种读取方式
  sr:
    scale_factor: 2
    blur_sigma: 1.0
    blur_kernel_size: 5
    boundary_mode: mirror
    downsample_mode: area

# 损失（三件套）
loss:
  reconstruction:
    weight: 1.0
  spectral:
    weight: 0.5
    low_freq_modes: 16
    use_rfft: false
    normalize: false
    boundary_mode: mirror
  data_consistency:
    weight: 1.0
  gradient_weight: 0.0

# 硬件优化（参考 docs/DEVELOPMENT.md 209-240）
hardware:
  # DataLoader
  num_workers: 32
  vram_threshold: 0.94
  memory_cleanup_frequency: 2
  # 线程与库
  torch_threads: 96
  mkl_threads: 96
  omp_threads: 96
  cpu:
    numexpr_threads: 64
    mkl_threads: 64
    omp_threads: 64
    torch_threads: 64
    blas_threads: 64
  memory:
    memory_threshold: 0.96
    auto_batch_size: true
    gradient_accumulation_steps: 1
    empty_cache_frequency: 50
    max_memory_allocated: 0.985
    memory_fraction: 0.985
    allow_tf32: true
    cudnn_benchmark: true
    aggressive_memory_usage: false
    disable_memory_cleanup: false
    memory_efficient: true
    pin_memory_device: null

# 模型：单帧空间SwinUNet（不使用AR包装器）
model:
  name: SwinUNet
  in_channels: 2
  out_channels: 2
  img_size: 128
  patch_size: 4
  window_size: 8
  depths: [1, 1, 2, 1]
  num_heads: [2, 4, 8, 16]
  embed_dim: 48
  mlp_ratio: 4.0
  drop_rate: 0.0
  attn_drop_rate: 0.0
  drop_path_rate: 0.0

# 训练：仅空间重建损失（禁用时间损失与AR环）
training:
  epochs: 10
  batch_size: 256  # 双卡 BF16 大批次
  gradient_accumulation_steps: 1
  max_epochs: 500
  dataloader:
    batch_size: 256
    val_batch_size: 128
    test_batch_size: 64
    num_workers: 32
    pin_memory: false
    persistent_workers: true
    prefetch_factor: 16
    drop_last: true
    multiprocessing_context: 'spawn'
    shuffle: true
    timeout: 180
  log_every_n_steps: 10
  enable_checkpointing: true
  enable_progress_bar: true
  precision: "bf16-mixed"
  sync_batchnorm: true
  find_unused_parameters: false
  # 优化器
  optimizer:
    name: AdamW
    lr: 0.002
    weight_decay: 0.01
    betas: [0.9, 0.999]
    eps: 1e-8
    amsgrad: false
  scheduler:
    name: CosineAnnealingLR
    T_max: 8
    eta_min: 1e-6

# 禁用时间预测与AR
sequential:
  enabled: false  # 不启用分阶段时空架构
ar:
  enabled: false  # 禁用AR环
nar:
  enabled: false  # 禁用NAR相关内容

# 测试阶段配置（避免缺失键导致异常）
testing:
  enabled: true
  run_final_test: true
  save_report: true

# 资源监控
performance_monitoring:
  enabled: true
  report_interval_seconds: 30