# AR训练配置文件 - 修复Transformer过拟合问题
# 针对小数据集优化，减少模型容量，增强正则化

experiment:
  name: "AR-DR2D-Debug-TemporalOnly-Fixed-s2025"
  description: "修复Transformer过拟合 - 小数据集约简版"
  device: cuda
  seed: 2025
  output_dir: runs
  log_every_n_steps: 5

# 设备与并行（单GPU）
device:
  accelerator: cuda
  devices: 1
  strategy: none
  allow_data_parallel_fallback: true
  precision: fp32

# 启用专用时序模型 - SequentialSpatiotemporalModel
ar:
  enabled: true

# 启用专用时序模型架构 - 简化版
sequential:
  enabled: true
  model_type: "SequentialSpatiotemporalModel"
  
  # 空间配置 - 减少特征维度
  spatial:
    in_channels: 1
    spatial_feature_dim: 32       # 从128减少到32
    out_channels: 1
    img_size: [128, 128]
    backbone_type: "fno2d"
    backbone_config:
      modes1: 8                   # 从12减少到8
      modes2: 8                   # 从12减少到8
      width: 32                   # 从64减少到32
      n_layers: 2                 # 从4减少到2
      activation: 'gelu'
  
  # 时序配置 - 大幅简化Transformer
  temporal:
    spatial_feature_dim: 32       # 匹配空间输出
    temporal_dim: 64              # 从256减少到64
    out_channels: 1
    img_size: [128, 128]
    num_heads: 4                  # 从8减少到4
    num_layers: 2                 # 从4减少到2
    dropout: 0.3                  # 从0.1增加到0.3
  
  # 一致性检查配置
  consistency:
    enabled: true
    spatial_temporal_consistency: true
    feature_consistency_weight: 0.1  # 从0.3减少到0.1
  
  # 训练配置 - 单阶段训练（仅时序）
  training:
    two_stage_training: false
    stage1_epochs: 0
    stage2_epochs: 100
    spatial_loss_weight: 0.0
    temporal_loss_weight: 1.0

# 禁用ARWrapper，使用专用模型
model_wrapper:
  enabled: false

# 模型配置 - 简化版FNO2D
model:
  name: fno2d
  in_channels: 1
  out_channels: 1
  img_size: 128
  modes1: 8                     # 减少模式数
  modes2: 8
  width: 32                     # 减少宽度
  n_layers: 2                   # 减少层数
  activation: 'gelu'

# 数据配置 - 保持无降采样
data:
  data_path: "data/DR2D/2D_diff-react_NA_NA.h5"
  dataset_name: RealDiffusionReaction
  img_size: 128
  keys: ["data"]
  component: u
  use_official_format: true
  splits_dir: splits
  target_channels: 1
  input_channels: 1
  sample_limit: 10              # 保持小数据集
  
  # AR特定配置
  T_in: 1
  T_out: 5
  
  # 数据集分割配置
  train_ratio: 0.8
  val_ratio: 0.15
  test_ratio: 0.05
  
  # 时间步配置
  time_step_start: 0
  time_step_end: 50
  time_step_stride: 1
  
  # 无降采样配置
  observation:
    mode: identity
    use_coords: false
    use_mask: false
  
  # 预处理
  normalize: true
  augmentation:
    enabled: false

  # 数据加载器 - 小批次避免过拟合
  dataloader:
    batch_size: 4               # 从16减少到4
    val_batch_size: 4
    test_batch_size: 2
    num_workers: 0
    pin_memory: true
    persistent_workers: false
    prefetch_factor: null
    drop_last: false
    shuffle: true
    timeout: 0

hardware:
  allow_tf32: false
  memory:
    cudnn_benchmark: false
  torch_threads: 64
  mkl_threads: 64
  omp_threads: 64
  interop_threads: 64
  blas_threads: 64
  numexpr_threads: 64
  vram_threshold: 0.98

# 训练配置 - 增强正则化
training:
  epochs: 100
  batch_size: 4                 # 匹配dataloader
  gradient_accumulation_steps: 1
  
  torch_compile: false
  channels_last: false
  
  # 损失权重 - 仅时序
  loss_weights:
    reconstruction: 0.0
    spectral: 0.0
    data_consistency: 0.0
    val_batch_size: 4
    test_batch_size: 2
    num_workers: 2
    pin_memory: true
    persistent_workers: false
    prefetch_factor: 2
    drop_last: false
    shuffle: true
  
  # 验证配置
  validation:
    enabled: true
    check_val_every_n_epoch: 5
    save_val_batch_for_viz: false
    log_val_metrics: true
  
  # 优化器配置 - 降低学习率
  optimizer:
    name: "AdamW"
    lr: 0.0001                  # 从0.0003降低到0.0001
    weight_decay: 0.001        # 从0.0001增加到0.001
    betas: [0.9, 0.999]
    eps: 1e-8
    fused: false
    foreach: false
  
  # 调度器配置 - 更短的周期
  scheduler:
    name: "CosineAnnealingLR"
    T_max: 100                  # 匹配总epoch数
    eta_min: 1e-5               # 提高最低学习率
    warmup_epochs: 10           # 增加warmup期
  
  # 梯度裁剪 - 增强稳定性
  gradient_clip_val: 1.0       # 从0.5增加到1.0
  gradient_clip_algorithm: norm
  
  # AMP配置
  amp:
    enabled: false
    autocast_dtype: float32
  
  # 简化的课程学习
  curriculum:
    enabled: true
    stages:
      - {T_out: 1, epochs: 40}  # 更长的单步学习
      - {T_out: 3, epochs: 30}  # 逐步扩展
      - {T_out: 5, epochs: 30}  # 最终阶段
    teacher_forcing_decay: 0.95
  
  # 早停 - 防止过拟合
  early_stopping:
    enabled: true               # 启用早停
    patience: 15                # 15个epoch无改善就停止
    monitor: val_loss
    mode: min
    min_delta: 1e-4
  
  # 检查点配置
  checkpoint:
    save_best: true
    save_last: true
    max_keep: 3
    monitor: val_loss
    mode: min
    save_every_n_epochs: 10

# 损失配置 - 简化损失函数
loss:
  ar_loss:
    weight: 0.0
    reduction: mean
  
  reconstruction:
    weight: 0.0
  spectral:
    weight: 0.0
  degradation_consistency:
    weight: 0.0
  gradient_weight: 0.0
  
  # 仅保留R2损失
  r2:
    weight: 1.0
    reduction: mean
  rel2_weight: 1.0
  mae_weight: 0.0

# 验证配置
validation:
  check_val_every_n_epoch: 5
  use_observation: false
  
  metrics:
    - rel_l2
    - mae
  
  rollout_steps: [1, 3, 5]
  
  convergence_criteria:
    target_rel_l2: 0.5          # 放宽收敛标准
    patience_for_convergence: 10
    min_improvement: 1e-4

# 日志配置
logging:
  experiment_name: "AR-DR2D-TemporalOnly-Fixed-s2025"
  version: null
  default_hp_metric: false
  log_model: false
  
  performance_monitoring:
    log_gpu_memory: true
    log_throughput: true
    log_batch_time: true
  
  tensorboard:
    save_dir: runs/tensorboard
    name: ar_training_temporal_only_fixed
    version: null
  
  visualization:
    save_samples_every_n_epochs: 20
    num_samples_to_save: 3        # 减少可视化样本
    save_training_curves: true
    save_rollout_visualization: false

# 随机种子
seed: 2025

# 测试配置
testing:
  enabled: false
  run_final_test: false
  save_predictions: false
  compute_detailed_metrics: false
  
  batch_size: 8
  save_visualizations: false
  num_visualization_samples: 0
  
  fast_mode: true              # 启用快速模式
  skip_complex_metrics: true
  minimal_logging: true

# 数据增强配置 - 保持禁用
data_augmentation:
  enable: false
  random_rotation: 
    enable: false
  random_flip:
    enable: false
  gaussian_noise:
    enable: false
  normalize_per_sample: false
  compute_statistics: false