# AR训练配置文件 - 硬件资源优化版（稳定配置）
# 专为双L40 GPU优化，平衡性能与稳定性

experiment:
  name: "AR-DR2D-HardwareOptimized-Stable-SwinUNet-s2025"
  description: "硬件资源优化配置 - 稳定优先"
  device: cuda
  seed: 2025
  output_dir: runs
  log_every_n_steps: 10  # 平衡日志频率与性能

# 设备与并行（DDP）- 硬件优化
device:
  accelerator: cuda
  devices: 2
  strategy: ddp
  allow_data_parallel_fallback: true
  precision: bf16-mixed  # L40支持BF16，性能更优

# 显式禁用AR时序，改为空间-only模式
ar:
  enabled: false

sequential:
  enabled: false

# 数据配置 - 硬件优化
data:
  data_path: "data/2D/diffusion-reaction/2D_diff-react_NA_NA.h5"
  dataset_name: RealDiffusionReaction
  img_size: 128  # 匹配实际数据分辨率
  sample_limit: 300  # 适中样本数量
  
  # AR特定配置
  T_in: 1      # 输入时间步数
  T_out: 1     # 纯空间预测：仅预测单帧
  
  # 数据集分割配置
  train_ratio: 0.8
  val_ratio: 0.15
  test_ratio: 0.05
  
  # 时间步配置 - 适中时间步数
  time_step_start: 0
  time_step_end: 100   # 适中时间步数
  time_step_stride: 1
  
  # 观测配置 - 降采样输入
  observation:
    mode: SR
    sr:
      scale_factor: 2
      blur_sigma: 1.0
      blur_kernel_size: 5
      boundary_mode: mirror
      downsample_mode: area
      align_corners: false
      antialias: true
  
  # 预处理
  normalize: true
  augmentation:
    enabled: false  # 关闭数据增强以减少CPU负载
    flip_prob: 0.0
    rotate_prob: 0.0
    noise_std: 0.0

  # 数据加载器 - 稳定配置
  dataloader:
    batch_size: 96         # 适中批次大小
    val_batch_size: 96     # 验证批次大小
    test_batch_size: 48    # 测试批次大小
    num_workers: 6         # 适中工作进程数
    pin_memory: true       # 启用页面锁定内存
    persistent_workers: true  # 保持工作进程存活
    prefetch_factor: 4       # 适中预取因子
    drop_last: true        # 丢弃最后不完整批次
    shuffle: true          # 保持数据打乱
    timeout: 90           # 适中超时时间

# 硬件优化配置
hardware:
  allow_tf32: true              # 启用TF32以提升性能
  memory:
    cudnn_benchmark: true       # 启用CUDNN基准测试
    cudnn_deterministic: false  # 禁用确定性算法以提升性能

# 模型配置 - 稳定版本
model:
  name: SwinUNet
  in_channels: 2    # 双通道数据（u,v）
  out_channels: 2
  img_size: 128
  patch_size: 4
  window_size: 8
  depths: [2, 2, 4, 2]    # 适中模型复杂度
  num_heads: [2, 4, 8, 16]  # 标准注意力头数
  embed_dim: 64          # 适中嵌入维度
  mlp_ratio: 4.0
  drop_rate: 0.1
  attn_drop_rate: 0.1
  drop_path_rate: 0.15   # 适中drop path率
  
  # AR包装器配置
  ar_config:
    detach_rollout: true
    scheduled_sampling: false
    teacher_forcing_ratio: 1.0

# 训练配置 - 稳定优先
training:
  epochs: 150             # 适中训练轮次
  batch_size: 96          # 批次大小
  gradient_accumulation_steps: 1  # 双卡下直接满批次
  
  # PyTorch编译优化 - 暂时禁用确保稳定性
  torch_compile: false    # 禁用torch.compile避免初始化问题
  torch_compile_backend: "inductor"  # 使用inductor后端
  torch_compile_mode: "reduce-overhead"  # 减少开销模式
  channels_last: true     # 启用channels_last内存格式
  
  # 训练优化
  dataloader:
    batch_size: 96
    val_batch_size: 96
    test_batch_size: 48
    num_workers: 6
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 4
    drop_last: true
    shuffle: true
  
  # 验证配置
  validation:
    enabled: true
    check_val_every_n_epoch: 5  # 每5轮验证一次
    save_val_batch_for_viz: false
    log_val_metrics: true
  
  # 优化器配置 - 稳定配置
  optimizer:
    name: "AdamW"
    lr: 0.001
    weight_decay: 0.0001
    betas: [0.9, 0.999]
    eps: 1e-8
    fused: false           # 禁用融合优化器确保稳定性
    foreach: false         # 禁用foreach优化
  
  # 调度器配置
  scheduler:
    name: "CosineAnnealingLR"
    T_max: 150            # 与总epochs一致
    eta_min: 1e-6
    warmup_epochs: 8      # 适中warmup轮次
  
  # 基本训练设置
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm
  
  # AMP配置 - 稳定配置
  amp:
    enabled: true
    autocast_dtype: bfloat16  # L40原生支持BF16
  
  # 检查点配置
  checkpoint:
    save_best: true
    save_last: true
    max_keep: 8           # 适中检查点保留
    monitor: val_loss
    mode: min
    save_every_n_epochs: 15
  
  # 早停配置
  early_stopping:
    enabled: true         # 启用早停
    patience: 30          # 适中耐心值
    monitor: val_loss
    mode: min
    min_delta: 1e-4

# 损失配置
loss:
  # AR特定损失
  ar_loss:
    weight: 0.0           # 空间-only模式
    reduction: mean
  
  # 辅助损失
  reconstruction:
    weight: 1.0
  spectral:
    weight: 0.3           # 适中频谱损失权重
  degradation_consistency:
    weight: 0.3           # 适中DC一致性损失权重
  gradient_weight: 0.05   # 适中梯度损失权重

# 验证配置
validation:
  check_val_every_n_epoch: 5
  use_observation: false
  
  metrics:
    - rel_l2
    - mae
    - rmse
    - psnr
  
  # AR特定验证
  rollout_steps: [1]
  
  convergence_criteria:
    target_rel_l2: 0.35   # 适中收敛标准
    patience_for_convergence: 5
    min_improvement: 1e-4

# 日志配置
logging:
  experiment_name: "AR-DR2D-HardwareOptimized-Stable-SwinUNet-s2025"
  version: null
  default_hp_metric: false
  log_model: false
  
  # 性能监控 - 稳定配置
  performance_monitoring:
    log_gpu_memory: true      # 监控GPU内存
    log_throughput: true      # 监控吞吐量
    log_batch_time: true      # 监控批次时间
    log_gpu_utilization: true  # 监控GPU利用率
  
  tensorboard:
    save_dir: runs/tensorboard
    name: ar_training_hardware_optimized_stable
    version: null
  
  visualization:
    save_samples_every_n_epochs: 20
    num_samples_to_save: 8
    save_training_curves: true
    save_rollout_visualization: false

# 随机种子
seed: 2025

# 测试配置
testing:
  enabled: true             # 启用测试
  run_final_test: true      # 运行最终测试
  save_predictions: false   # 不保存预测结果以节省空间
  compute_detailed_metrics: true
  
  batch_size: 48          # 测试批次大小
  save_visualizations: false
  num_visualization_samples: 5
  
  fast_mode: false
  skip_complex_metrics: false
  minimal_logging: false

# 系统资源监控
system_monitoring:
  enabled: true
  log_interval: 120       # 每120秒记录一次系统状态
  monitor_gpu_temperature: true
  monitor_cpu_usage: true
  monitor_memory_usage: true
  monitor_disk_io: false   # 禁用磁盘IO监控以减少开销