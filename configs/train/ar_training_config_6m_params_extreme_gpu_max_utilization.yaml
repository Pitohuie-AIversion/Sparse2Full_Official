# AR训练配置文件 - 6M参数+极致GPU利用率+极限大batch
# 新实验组：6M参数模型+极限大batch+最大化GPU计算与内存利用

experiment:
  name: "AR-DR2D-6MParams-ExtremeGPU-MaxUtilization-s2025"
  description: "6M参数模型+极限大batch+最大化GPU计算与内存利用率新实验"
  device: cuda
  seed: 2025
  output_dir: runs
  log_every_n_steps: 20  # 高频日志监控极限训练

# 设备与并行（DDP）- 极限资源优化
device:
  accelerator: cuda
  devices: 2
  strategy: ddp
  allow_data_parallel_fallback: true
  precision: 16-mixed  # 强制FP16最大化性能与内存效率

# CPU和内存极限优化
cpu_optimization:
  max_threads: true       # 使用所有CPU核心
  num_interop_threads: 0  # PyTorch自动优化
  num_intraop_threads: 0  # PyTorch自动优化
  
# CUDA和硬件极限优化
hardware:
  allow_tf32: true              # 强制启用TF32
  memory:
    cudnn_benchmark: true       # 强制CUDNN自动调优
    cudnn_deterministic: false  # 禁用确定性算法
    cudnn_allow_tf32: true    # 强制CUDNN TF32
  cuda:
    enable_flash_attention: false  # 禁用确保最大稳定性
    enable_memory_efficient_attention: false

# 显式禁用AR时序，改为纯空间模式
ar:
  enabled: false

sequential:
  enabled: false

# 数据配置 - 100样本+极限CPU/GPU协同
data:
  data_path: "data/2D/diffusion-reaction/2D_diff-react_NA_NA.h5"
  dataset_name: RealDiffusionReaction
  img_size: 128  # 匹配实际数据分辨率
  sample_limit: 100  # 仅100个样本
  
  # AR特定配置
  T_in: 1      # 输入时间步数
  T_out: 1     # 纯空间预测：仅预测单帧
  
  # 数据集分割配置 - 极限batch优化
  train_ratio: 0.85    # 85个训练样本（最大化训练数据）
  val_ratio: 0.1       # 10个验证样本  
  test_ratio: 0.05     # 5个测试样本
  
  # 时间步配置 - 最大化时间步数
  time_step_start: 0
  time_step_end: 101   # 使用全部101个时间步
  time_step_stride: 1
  
  # 观测配置 - 降采样输入
  observation:
    mode: SR
    sr:
      scale_factor: 2
      blur_sigma: 1.0
      blur_kernel_size: 5
      boundary_mode: mirror
      downsample_mode: area
      align_corners: false
      antialias: true
  
  # 预处理
  normalize: true
  augmentation:
    enabled: false  # 关闭数据增强
    flip_prob: 0.0
    rotate_prob: 0.0
    noise_std: 0.0

  # 数据加载器 - 极限大batch优化（理论最大值）
  dataloader:
    batch_size: 8000        # 极限大batch大小（理论最大约8000-10000）
    val_batch_size: 10     # 验证批次=全部验证样本
    test_batch_size: 5     # 测试批次=全部测试样本
    num_workers: 64        # 极限工作进程数（系统最大）
    pin_memory: true       # 强制页面锁定内存
    persistent_workers: true  # 保持工作进程存活
    prefetch_factor: 256   # 极限预取因子（最大化数据预加载）
    drop_last: true        # 丢弃不完整batch确保对齐
    shuffle: true          # 保持数据打乱
    timeout: 3600          # 极长超时时间应对极限batch
    multiprocessing_context: "spawn"  # 使用spawn避免fork问题

# 模型配置 - 严格6M参数模型（精确控制架构）
model:
  name: SwinUNet
  in_channels: 2    # 双通道数据（u,v）
  out_channels: 2
  img_size: 128
  patch_size: 8     # 标准patch大小
  window_size: 4    # 标准窗口大小
  depths: [2, 3, 6, 2]   # 精心调整深度 [2,3,6,2] -> ~6M参数
  num_heads: [2, 4, 8, 16]  # 精心调整注意力头数
  embed_dim: 48           # 减少嵌入维度
  mlp_ratio: 2.5         # 减少MLP比例
  drop_rate: 0.1          # 轻微dropout防止过拟合
  attn_drop_rate: 0.1     # 注意力dropout
  drop_path_rate: 0.15     # 适中的drop path
  
  # AR包装器配置
  ar_config:
    detach_rollout: true
    scheduled_sampling: false
    teacher_forcing_ratio: 1.0

# 训练配置 - 5000 epochs极限训练+极限大batch
training:
  epochs: 5000            # 5000 epochs极限训练
  batch_size: 8000        # 极限大batch大小最大化GPU内存与计算利用
  gradient_accumulation_steps: 1  # 双卡下直接极限batch
  
  # PyTorch编译优化 - 启用提升性能
  torch_compile: true     # 启用torch.compile提升性能
  torch_compile_mode: "max-autotune"  # 极限编译优化
  torch_compile_backend: "inductor"   # 使用inductor后端
  channels_last: true     # 启用channels_last内存格式
  
  # 训练优化
  dataloader:
    batch_size: 8000        # 极限大batch大小
    val_batch_size: 10
    test_batch_size: 5
    num_workers: 64        # 极限工作进程数
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 256   # 极限预取因子
    drop_last: true       # 丢弃不完整batch
    shuffle: true
  
  # 验证配置 - 极限减少验证频率
  validation:
    enabled: true
    check_val_every_n_epoch: 200  # 每200轮验证（极限减少验证开销）
    save_val_batch_for_viz: true  # 保存验证批次用于可视化
    log_val_metrics: true
  
  # 优化器配置 - 极限学习率应对极限大batch
  optimizer:
    name: "AdamW"
    lr: 0.0040             # 极限学习率应对极限大batch（提升5倍）
    weight_decay: 0.0001
    betas: [0.9, 0.999]
    eps: 1e-8
    fused: true            # 强制融合优化器提升性能
    foreach: false         # 禁用foreach避免冲突
  
  # 调度器配置 - 长周期调度
  scheduler:
    name: "CosineAnnealingLR"
    T_max: 5000           # 与总epochs一致
    eta_min: 1e-5          # 更高的最小学习率
    warmup_epochs: 250       # 长warmup期（5%的epochs）
  
  # 基本训练设置 - 极限梯度裁剪应对大batch
  gradient_clip_val: 3.0    # 极限梯度裁剪阈值应对极限batch
  gradient_clip_algorithm: norm
  
  # AMP配置 - 极限FP16性能
  amp:
    enabled: true          # 强制AMP最大化性能
    autocast_dtype: float16  # 强制FP16最大化性能
    grad_scaler: true      # 强制梯度缩放
    growth_factor: 2.0
    backoff_factor: 0.5
    growth_interval: 500   # 更频繁的梯度缩放调整
  
  # 检查点配置 - 极限节省存储与I/O
  checkpoint:
    save_best: true
    save_last: true
    max_keep: 1           # 极限减少保留检查点数
    monitor: val_loss
    mode: min
    save_every_n_epochs: 1000  # 极限减少保存频率
  
  # 早停配置 - 禁用确保完整训练
  early_stopping:
    enabled: false        # 禁用早停确保完整5000 epochs训练
    patience: 3000        # 极限耐心值
    monitor: val_loss
    mode: min
    min_delta: 1e-4

# 损失配置 - 仅使用R2损失（最稳定）
loss:
  # AR特定损失
  ar_loss:
    weight: 0.0           # 空间-only模式
    reduction: mean
  
  # 仅使用R2损失（最稳定）
  reconstruction:
    weight: 1.0           # R2损失权重为1.0
  spectral:
    weight: 0.0           # 禁用频谱损失
  degradation_consistency:
    weight: 0.0           # 禁用DC一致性损失
  gradient_weight: 0.0    # 禁用梯度损失

# 验证配置
validation:
  check_val_every_n_epoch: 200  # 每200轮验证
  use_observation: false
  
  metrics:
    - rel_l2
    - mae
    - rmse
    - psnr
  
  # AR特定验证
  rollout_steps: [1]
  
  convergence_criteria:
    target_rel_l2: 0.12    # 严格收敛标准
    patience_for_convergence: 300
    min_improvement: 1e-4

# 日志配置 - 极限监控
logging:
  experiment_name: "AR-DR2D-6MParams-ExtremeGPU-MaxUtilization-s2025"
  version: null
  default_hp_metric: false
  log_model: false
  
  # 性能监控 - 极限监控
  performance_monitoring:
    log_gpu_memory: true      # 监控GPU内存
    log_throughput: true      # 监控吞吐量
    log_batch_time: true      # 监控批次时间
    log_gpu_utilization: true  # 监控GPU利用率
    log_cuda_events: true    # 记录CUDA事件
    log_cpu_usage: true      # 监控CPU使用率
    log_memory_usage: true   # 监控内存使用率
  
  tensorboard:
    save_dir: runs/tensorboard
    name: ar_training_6m_params_extreme_gpu_max_utilization
    version: null
  
  visualization:
    save_samples_every_n_epochs: 1000  # 极限减少可视化频率
    num_samples_to_save: 2         # 极限减少保存样本数
    save_training_curves: true
    save_rollout_visualization: true   # 保存预测效果

# 随机种子
seed: 2025

# 测试配置 - 极限测试
testing:
  enabled: true             # 启用测试
  run_final_test: true      # 运行最终测试
  save_predictions: true    # 保存预测结果以验证效果
  compute_detailed_metrics: true
  
  batch_size: 5             # 测试批次=全部测试样本
  save_visualizations: true # 保存测试可视化
  num_visualization_samples: 2  # 极限减少可视化样本数
  
  fast_mode: false
  skip_complex_metrics: false
  minimal_logging: false