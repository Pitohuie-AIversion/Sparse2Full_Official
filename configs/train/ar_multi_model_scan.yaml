# 多模型扫描配置文件
# 基于ar_training_config debug.yaml，适配所有7个模型的对比扫描

experiment:
  name: "AR-DR2D-MultiModel-Scan-s2025-20251115"
  description: "7模型完整对比扫描 - 真实PDEBench数据"
  device: cuda
  seed: 2025
  output_dir: runs
  log_every_n_steps: 10

# 设备与并行（DDP）
device:
  accelerator: cuda
  devices: 2
  strategy: ddp
  allow_data_parallel_fallback: true
  precision: bf16-mixed

# 显式禁用AR时序，改为空间-only模式
ar:
  enabled: false

sequential:
  enabled: false

# 数据配置 - 使用真实PDEBench数据
data:
  data_path: "data/2D/diffusion-reaction/2D_diff-react_NA_NA.h5"
  dataset_name: RealDiffusionReaction
  img_size: 128  # 匹配实际数据分辨率
  keys: ["data"]
  use_official_format: true
  splits_dir: splits
  target_channels: 2  # 数据实际有2个通道
  input_channels: 2   # 输入也对应2个通道
  
  # AR特定配置
  T_in: 1      # 输入时间步数
  T_out: 1     # 纯空间预测：仅预测单帧
  
  # 数据集分割配置
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15  # 充足的测试集用于评估
  
  # 时间步配置
  time_step_start: 0
  time_step_end: 100  # 使用更多时间步
  time_step_stride: 1
  
  # 观测配置 - 降采样输入
  observation:
    mode: SR
    sr:
      scale_factor: 2
      blur_sigma: 1.0
      blur_kernel_size: 5
      boundary_mode: mirror
      downsample_mode: area
      align_corners: false
      antialias: true
  
  # 预处理
  normalize: true
  augmentation:
    enabled: false
  
  # 禁用合成数据模式
  use_synthetic_data: false
  
  # 数据加载器
  dataloader:
    batch_size: 256  # 适中批次大小
    val_batch_size: 128
    test_batch_size: 128
    num_workers: 16
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 4
    drop_last: true
    shuffle: true
    timeout: 60

hardware:
  allow_tf32: true
  memory:
    cudnn_benchmark: true

# 模型配置将动态调整
model:
  # 基础参数，具体模型会覆盖
  name: SwinUNet  # 默认模型
  in_channels: 2  # 关键：数据实际有2个通道
  out_channels: 2  # 输出也对应2个通道
  img_size: 128
  patch_size: 4
  window_size: 8
  drop_rate: 0.1
  attn_drop_rate: 0.1
  drop_path_rate: 0.1
  
  # AR包装器配置
  ar_config:
    detach_rollout: true
    scheduled_sampling: false
    teacher_forcing_ratio: 1.0

# 训练配置
training:
  epochs: 100  # 适中训练轮数
  batch_size: 256
  gradient_accumulation_steps: 1
  
  # PyTorch编译优化配置
  torch_compile: false
  torch_compile_backend: "inductor"
  torch_compile_mode: "reduce-overhead"
  channels_last: true
  
  loss_weights:
    reconstruction: 1.0
    spectral: 0.5
    data_consistency: 1.0
  
  # 数据加载器配置
  dataloader:
    batch_size: 256
    val_batch_size: 128
    test_batch_size: 128
    num_workers: 16
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 4
    drop_last: true
    shuffle: true
  
  # 验证配置
  validation:
    enabled: true
    check_val_every_n_epoch: 5
    save_val_batch_for_viz: true
    log_val_metrics: true
  
  # 优化器配置
  optimizer:
    name: "AdamW"
    lr: 0.001
    weight_decay: 0.0001
    betas: [0.9, 0.999]
    eps: 1e-8
    fused: false
    foreach: false
  
  # 调度器
  scheduler:
    name: "CosineAnnealingLR"
    T_max: 100
    eta_min: 1e-6
    warmup_epochs: 5
  
  # 基本训练设置
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm
  
  # AMP配置
  amp:
    enabled: true
    autocast_dtype: bfloat16
  
  # 课程学习配置
  curriculum:
    enabled: false
    stages: []
  
  # 检查点
  checkpoint:
    save_best: true
    save_last: true
    max_keep: 3
    monitor: val_loss
    mode: min
    save_every_n_epochs: 20
  
  # 早停
  early_stopping:
    enabled: true
    patience: 20
    monitor: val_loss
    mode: min
    min_delta: 1e-4

# AR损失配置
loss:
  # AR特定损失
  ar_loss:
    weight: 0.0  # 禁用AR时序损失，空间-only
    reduction: mean
  
  # 辅助损失
  reconstruction:
    weight: 1.0
  spectral:
    weight: 0.5  # 启用频谱损失
  degradation_consistency:
    weight: 1.0  # 启用DC一致性损失
  gradient_weight: 0.0

# 验证配置
validation:
  check_val_every_n_epoch: 5
  use_observation: true
  
  metrics:
    - rel_l2
    - mae
    - psnr
    - ssim
  
  # AR特定验证
  rollout_steps: [1]
  
  convergence_criteria:
    target_rel_l2: 0.3
    patience_for_convergence: 5
    min_improvement: 1e-4

# 日志配置
logging:
  experiment_name: "AR-DR2D-MultiModel-Scan"
  version: null
  default_hp_metric: false
  log_model: false
  
  # 性能监控
  performance_monitoring:
    log_gpu_memory: true
    log_throughput: true
    log_batch_time: true
  
  tensorboard:
    save_dir: runs/tensorboard
    name: multi_model_scan
    version: null
  
  visualization:
    save_samples_every_n_epochs: 10
    num_samples_to_save: 3
    save_training_curves: true
    save_rollout_visualization: false

# 随机种子
seed: 2025

# 测试配置
testing:
  enabled: true  # 启用测试
  run_final_test: true
  save_predictions: true
  compute_detailed_metrics: true
  
  batch_size: 128
  save_visualizations: true
  num_visualization_samples: 5
  
  # 快速测试模式
  fast_mode: false
  skip_complex_metrics: false
  minimal_logging: false

# 数据增强配置
data_augmentation:
  enable: false