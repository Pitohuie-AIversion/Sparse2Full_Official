# AR训练配置文件 - 使用简单空间模型的分阶段训练
# 基于ARWrapper实现分阶段时序预测

experiment:
  name: "AR-DR2D-Simple-Staged-s2025"
  description: "简化分阶段AR训练 - 简单空间模型 + ARWrapper"
  device: cuda
  seed: 2025
  output_dir: runs
  log_every_n_steps: 5

# 设备与并行（DDP）
device:
  accelerator: cuda
  devices: 1  # 单GPU避免DDP问题
  strategy: auto
  allow_data_parallel_fallback: true
  precision: bf16-mixed

# AR配置 - 使用ARWrapper实现分阶段训练
ar:
  enabled: true                    # 启用AR时序预测
  teacher_forcing_ratio: 0.9     # 高比例教师强制，逐步降低
  scheduled_sampling: true       # 启用计划采样
  scheduled_sampling_decay: 0.95 # 逐步降低教师强制比例

# 数据配置
data:
  data_path: "data/2D/diffusion-reaction/2D_diff-react_NA_NA.h5"
  dataset_name: RealDiffusionReaction
  img_size: 128  # 匹配实际数据分辨率
  keys: ["data"]
  component: u        # 选择u分量（第1通道）
  use_official_format: true
  splits_dir: splits  # 启用z-score统计
  target_channels: 1  # 单通道预测
  input_channels: 1   # 单通道观测
  sample_limit: 10  # Debug模式：限制样本数
  
  # AR特定配置 - 分阶段时序预测
  T_in: 1      # 输入时间步数
  T_out: 5     # 目标：5步时序预测（课程学习逐步增加）
  
  # 数据集分割配置
  train_ratio: 0.8
  val_ratio: 0.15
  test_ratio: 0.05
  
  # 时间步配置
  time_step_start: 0
  time_step_end: 50   # Debug模式：仅使用前50个时间步
  time_step_stride: 1
  
  # 观测配置 - 降采样输入
  observation:
    mode: SR
    sr:
      scale_factor: 2
      blur_sigma: 1.0
      blur_kernel_size: 5
      boundary_mode: mirror
      downsample_mode: area
      align_corners: false
      antialias: true
  
  # 预处理
  normalize: true
  augmentation:
    enabled: false
    flip_prob: 0.0
    rotate_prob: 0.0
    noise_std: 0.0

  # 数据加载器
  dataloader:
    batch_size: 32  # 减小批次大小避免内存问题
    val_batch_size: 32
    test_batch_size: 32
    num_workers: 4
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 2
    drop_last: false
    shuffle: true
    timeout: 60

# 模型配置 - 使用简单的UNet作为基础空间模型
model:
  name: unet  # 改为简单的UNet避免FNO的复数运算问题
  in_channels: 1
  out_channels: 1
  img_size: 128

# 训练配置
training:
  epochs: 70    # 总epoch数：15(空间) + 25(时序) + 30(联合) = 70
  batch_size: 32
  gradient_accumulation_steps: 4  # 增加梯度累积
  
  # 课程学习配置 - 分阶段增加时序步长
  curriculum:
    enabled: true                   # 启用课程学习
    stages:
      - {T_out: 1, epochs: 15}     # 阶段1：空间预训练，15epoch，T_out=1
      - {T_out: 3, epochs: 25}     # 阶段2：时序预训练，25epoch，T_out=3
      - {T_out: 5, epochs: 30}     # 阶段3：联合微调，30epoch，T_out=5
    teacher_forcing_decay: 0.95     # 每阶段降低教师强制比例
  
  # 优化器配置
  optimizer:
    name: "AdamW"
    lr: 0.001
    weight_decay: 0.0001
    betas: [0.9, 0.999]
    eps: 1e-8
    fused: false
    foreach: false
  
  # 调度器配置
  scheduler:
    name: "CosineAnnealingLR"
    T_max: 70   # 与总epochs一致
    eta_min: 1e-6
    warmup_epochs: 5
  
  # 基本训练设置
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm
  
  # AMP配置
  amp:
    enabled: true
    autocast_dtype: bfloat16
  
  # 检查点配置
  checkpoint:
    save_best: true
    save_last: true
    max_keep: 5
    monitor: val_loss
    mode: min
    save_every_n_epochs: 10
  
  # 早停配置
  early_stopping:
    enabled: false  # 禁用早停，完整运行
    patience: 200
    monitor: val_loss
    mode: min
    min_delta: 1e-6

# AR损失配置
loss:
  # AR特定损失 - 时序预测损失
  ar_loss:
    weight: 1.0                     # 启用AR时序损失
    reduction: mean
  
  # 辅助损失 - 分阶段调整
  reconstruction:
    weight: 1.0                     # 重建损失始终启用
  spectral:
    weight: 0.3                     # 轻度频谱损失（低频约束）
  degradation_consistency:
    weight: 0.5                     # 中等DC一致性损失
  gradient_weight: 0.0

# 验证配置
validation:
  check_val_every_n_epoch: 5        # 每5个epoch验证一次
  use_observation: false
  
  metrics:
    - rel_l2                     # 核心指标：相对L2误差
    - mae                        # 平均绝对误差
    - degradation_consistency    # DC一致性误差
  
  # AR特定验证 - 多时序步验证
  rollout_steps: [1, 3, 5]      # 验证1步、3步、5步预测效果
  
  convergence_criteria:
    target_rel_l2: 0.3          # 空间阶段目标：Rel-L2 ≤ 0.3
    patience_for_convergence: 5   # 连续5次改进不足则转换阶段
    min_improvement: 5e-4         # 最小改进阈值

# 日志配置
logging:
  experiment_name: "AR-DR2D-UNet-Staged-Simple-s2025"
  version: null
  default_hp_metric: false
  log_model: false
  
  # 性能监控
  performance_monitoring:
    log_gpu_memory: true
    log_throughput: true
    log_batch_time: true
  
  tensorboard:
    save_dir: runs/tensorboard
    name: ar_unet_staged_simple
    version: null
  
  visualization:
    save_samples_every_n_epochs: 10
    num_samples_to_save: 3
    save_training_curves: true
    save_rollout_visualization: true

# 随机种子
seed: 2025

# 测试配置
testing:
  enabled: false
  run_final_test: false
  save_predictions: false
  compute_detailed_metrics: false
  batch_size: 32
  save_visualizations: false
  num_visualization_samples: 0
  fast_mode: false

# 数据增强配置
data_augmentation:
  enable: false
  random_rotation: 
    enable: false
    degrees: [-5, 5]
  random_flip:
    enable: false
    horizontal: 0.5
    vertical: 0.3
  gaussian_noise:
    enable: false
    std: 0.01
  normalize_per_sample: false
  compute_statistics: false