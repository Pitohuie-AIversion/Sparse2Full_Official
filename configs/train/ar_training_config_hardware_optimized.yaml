# AR训练配置文件 - 硬件资源优化版
# 专为双L40 GPU优化，最大化硬件利用率

experiment:
  name: "AR-DR2D-HardwareOptimized-SwinUNet-s2025"
  description: "硬件资源优化配置 - 最大化双GPU利用率"
  device: cuda
  seed: 2025
  output_dir: runs
  log_every_n_steps: 10  # 平衡日志频率与性能

# 设备与并行（DDP）- 硬件优化
device:
  accelerator: cuda
  devices: 2
  strategy: ddp
  allow_data_parallel_fallback: true
  precision: bf16-mixed  # L40支持BF16，性能更优

# 显式禁用AR时序，改为空间-only模式
ar:
  enabled: false

sequential:
  enabled: false

# 数据配置 - 硬件优化
# 注：已存在logging段，保持单一logging配置，避免重复键
data:
  data_path: "data/2D/diffusion-reaction/2D_diff-react_NA_NA.h5"
  dataset_name: RealDiffusionReaction
  img_size: 128  # 匹配实际数据分辨率
  sample_limit: 500  # 增加样本数量以更好利用GPU
  
  # AR特定配置
  T_in: 1      # 输入时间步数
  T_out: 1     # 纯空间预测：仅预测单帧
  
  # 数据集分割配置
  train_ratio: 0.8
  val_ratio: 0.15
  test_ratio: 0.05
  
  # 时间步配置 - 增加时间步数以充分利用GPU内存
  time_step_start: 0
  time_step_end: 200   # 增加时间步数
  time_step_stride: 1
  
  # 观测配置 - 降采样输入
  observation:
    mode: SR
    sr:
      scale_factor: 2
      blur_sigma: 1.0
      blur_kernel_size: 5
      boundary_mode: mirror
      downsample_mode: area
      align_corners: false
      antialias: true
  
  # 预处理
  normalize: true
  augmentation:
    enabled: false  # 关闭数据增强以减少CPU负载
    flip_prob: 0.0
    rotate_prob: 0.0
    noise_std: 0.0

  # 数据加载器 - 硬件优化配置
  dataloader:
    batch_size: 128        # 增大批次大小以充分利用GPU内存
    val_batch_size: 128    # 验证批次大小
    test_batch_size: 64    # 测试批次大小
    num_workers: 8         # 增加工作进程数（L40有充足CPU核心）
    pin_memory: true       # 启用页面锁定内存
    persistent_workers: true  # 保持工作进程存活
    prefetch_factor: 8     # 增加预取因子
    drop_last: true        # 丢弃最后不完整批次
    shuffle: true          # 保持数据打乱
    timeout: 120          # 增加超时时间

# 硬件优化配置
hardware:
  allow_tf32: true              # 启用TF32以提升性能
  memory:
    cudnn_benchmark: true       # 启用CUDNN基准测试
    cudnn_deterministic: false  # 禁用确定性算法以提升性能
    allow_non_tensor_cuda: true  # 允许非张量CUDA操作

# 模型配置 - 硬件优化版本
model:
  name: SwinUNet
  in_channels: 2    # 双通道数据（u,v）
  out_channels: 2
  img_size: 128
  patch_size: 4
  window_size: 8
  depths: [2, 2, 6, 2]    # 增加模型复杂度以充分利用GPU
  num_heads: [3, 6, 12, 24]  # 优化注意力头数
  embed_dim: 96          # 增加嵌入维度
  mlp_ratio: 4.0
  drop_rate: 0.1
  attn_drop_rate: 0.1
  drop_path_rate: 0.2    # 适当增加drop path率
  
  # AR包装器配置
  ar_config:
    detach_rollout: true
    scheduled_sampling: false
    teacher_forcing_ratio: 1.0

# 训练配置 - 硬件优化
training:
  epochs: 200             # 增加训练轮次
  batch_size: 128         # 批次大小
  gradient_accumulation_steps: 1  # 双卡下直接满批次
  
  # PyTorch编译优化 - 暂时禁用以确保稳定性
  torch_compile: false    # 禁用torch.compile避免初始化问题
  torch_compile_backend: "inductor"  # 使用inductor后端
  torch_compile_mode: "reduce-overhead"  # 减少开销模式
  channels_last: true     # 启用channels_last内存格式
  
  # 训练优化
  dataloader:
    batch_size: 128
    val_batch_size: 128
    test_batch_size: 64
    num_workers: 8
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 8
    drop_last: true
    shuffle: true
  
  # 验证配置
  validation:
    enabled: true
    check_val_every_n_epoch: 5  # 每5轮验证一次
    save_val_batch_for_viz: false
    log_val_metrics: true
  
  # 优化器配置 - 硬件优化
  optimizer:
    name: "AdamW"
    lr: 0.001
    weight_decay: 0.0001
    betas: [0.9, 0.999]
    eps: 1e-8
    fused: true           # 启用融合优化器（L40支持）
    foreach: false        # 禁用foreach优化（与fused冲突）
  
  # 调度器配置
  scheduler:
    name: "CosineAnnealingLR"
    T_max: 200            # 与总epochs一致
    eta_min: 1e-6
    warmup_epochs: 10     # 增加warmup轮次
  
  # 基本训练设置
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm
  
  # AMP配置 - 硬件优化
  amp:
    enabled: true
    autocast_dtype: bfloat16  # L40原生支持BF16
  
  # 检查点配置
  checkpoint:
    save_best: true
    save_last: true
    max_keep: 10          # 保留更多检查点
    monitor: val_loss
    mode: min
    save_every_n_epochs: 20
  
  # 早停配置
  early_stopping:
    enabled: true         # 启用早停
    patience: 50          # 增加耐心值
    monitor: val_loss
    mode: min
    min_delta: 1e-4

# 损失配置
loss:
  # AR特定损失
  ar_loss:
    weight: 0.0           # 空间-only模式
    reduction: mean
  
  # 辅助损失
  reconstruction:
    weight: 1.0
  spectral:
    weight: 0.5           # 启用频谱损失
  degradation_consistency:
    weight: 0.5           # 启用DC一致性损失
  gradient_weight: 0.1    # 启用梯度损失

# 验证配置
validation:
  check_val_every_n_epoch: 5
  use_observation: false
  
  metrics:
    - rel_l2
    - mae
    - rmse
    - psnr
  
  # AR特定验证
  rollout_steps: [1]
  
  convergence_criteria:
    target_rel_l2: 0.3    # 更严格的收敛标准
    patience_for_convergence: 5
    min_improvement: 1e-4

# 日志配置
logging:
  experiment_name: "AR-DR2D-HardwareOptimized-SwinUNet-s2025"
  version: null
  default_hp_metric: false
  log_model: false
  
  # 性能监控 - 硬件优化
  performance_monitoring:
    log_gpu_memory: true      # 监控GPU内存
    log_throughput: true      # 监控吞吐量
    log_batch_time: true      # 监控批次时间
    log_gpu_utilization: true  # 监控GPU利用率
  
  tensorboard:
    save_dir: runs/tensorboard
    name: ar_training_hardware_optimized
    version: null
  
  visualization:
    save_samples_every_n_epochs: 20
    num_samples_to_save: 10
    save_training_curves: true
    save_rollout_visualization: false

# 随机种子
seed: 2025

# 测试配置
testing:
  enabled: true             # 启用测试
  run_final_test: true      # 运行最终测试
  save_predictions: false   # 不保存预测结果以节省空间
  compute_detailed_metrics: true
  
  batch_size: 64          # 测试批次大小
  save_visualizations: false
  num_visualization_samples: 5
  
  fast_mode: false
  skip_complex_metrics: false
  minimal_logging: false

# 系统资源监控
system_monitoring:
  enabled: true
  log_interval: 60          # 每60秒记录一次系统状态
  monitor_gpu_temperature: true
  monitor_cpu_usage: true
  monitor_memory_usage: true
  monitor_disk_io: true