# 最大CPU硬件利用训练配置
# 适用于无GPU环境，利用高核心数与大内存

defaults:
  - _self_

experiment:
  name: "pdebench_sr_x4_cpu_max"
  device: "cpu"
  seed: 2025
  output_dir: "runs"

data:
  data_path: "datasets/sample_data.hdf5"
  dataset_name: "PDEBench"
  keys: ["tensor"]
  splits_dir: "splits"
  image_size: 128
  observation:
    mode: "SR"
    sr:
      scale_factor: 4
      blur_sigma: 1.0
      blur_kernel_size: 5
      boundary_mode: "mirror"
    crop:
      crop_size: [64, 64]
      crop_strategy: "uniform"
      boundary_mode: "mirror"
  preprocessing:
    normalize: true
    cache_data: false
  dataloader:
    batch_size: 64
    num_workers: 96
    pin_memory: false
    persistent_workers: true
    prefetch_factor: 4

model:
  name: "SwinUNet"
  params:
    in_channels: 1
    out_channels: 1
    img_size: 128
    kwargs:
      patch_size: 4
      window_size: 8
      depths: [2, 2, 6, 2]
      num_heads: [3, 6, 12, 24]
      embed_dim: 96
      mlp_ratio: 4.0
      drop_rate: 0.0
      attn_drop_rate: 0.0
      drop_path_rate: 0.1

training:
  epochs: 2
  batch_size: 64
  seed: 2025
  output_dir: "runs"
  optimizer:
    name: "AdamW"
    params:
      lr: 1.0e-4
      weight_decay: 1.0e-4
      betas: [0.9, 0.999]
  scheduler:
    name: "cosine_warmup"
    params:
      T_max: 200
      warmup_steps: 1000
      eta_min: 1.0e-6
  grad_clip_norm: 1.0
  log_interval: 10
  save_interval: 1
  plot_interval: 10
  use_amp: false  # CPU上禁用CUDA AMP；如需CPU bf16请在代码支持后启用

loss:
  rec_weight: 1.0
  spec_weight: 0.0
  dc_weight: 0.0
  rec_loss_type: "l2"
  spec_loss_type: "l2"
  dc_loss_type: "l2"
  low_freq_modes: 4
  mirror_padding: false
  use_gradient_loss: false
  gradient_weight: 0.1
  use_pde_residual_loss: false
  pde_residual_weight: 0.1
  pde_low_freq_weight: 2.0

validation:
  batch_size: 128
  metrics:
    - "rel_l2"
    - "mae"
    - "psnr"
    - "ssim"
    - "frmse_low"
    - "frmse_mid"
    - "frmse_high"

device:
  use_cuda: false
  cuda_device: 0
  num_workers: 96
  pin_memory: false

logging:
  level: "INFO"
  use_tensorboard: true
  use_wandb: false
  wandb_project: "pdebench-sparse2full"

reproducibility:
  deterministic: true
  benchmark: false